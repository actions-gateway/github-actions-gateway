<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1220"/>
      <stop offset="1" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#326CE5"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
    <linearGradient id="tier" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#326CE5" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="markGrad" gradientUnits="userSpaceOnUse" x1="12" y1="2.5" x2="12" y2="21.5">
      <stop offset="0" stop-color="#326CE5"/>
      <stop offset="1" stop-color="#2DD4BF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>
  <!-- subtle dot grid -->
  <g fill="#1F2A3A" opacity="0.6">
    <circle cx="1090" cy="90"  r="2"/><circle cx="1140" cy="90" r="2"/><circle cx="1190" cy="90" r="2"/><circle cx="1240" cy="90" r="2"/>
    <circle cx="1090" cy="140" r="2"/><circle cx="1140" cy="140" r="2"/><circle cx="1190" cy="140" r="2"/><circle cx="1240" cy="140" r="2"/>
  </g>

  <!-- Logomark (four-tier mark) inline with the kicker, matching the header logo / favicon -->
  <g transform="translate(77,124) scale(1.25)" fill="url(#markGrad)">
    <rect x="2.5" y="3" width="19" height="2.7" rx="1.35"/>
    <rect x="4.35" y="8" width="15.3" height="2.7" rx="1.35"/>
    <rect x="6.2" y="13" width="11.6" height="2.7" rx="1.35"/>
    <rect x="8" y="18" width="8" height="2.7" rx="1.35"/>
  </g>

  <!-- Kicker -->
  <text x="122" y="148" fill="#8B949E" font-size="22" font-weight="600" letter-spacing="3">KUBERNETES OPERATOR · SELF-HOSTED RUNNERS</text>

  <!-- Title -->
  <text x="78" y="236" fill="#E6EDF3" font-size="74" font-weight="800" letter-spacing="-1.5">GitHub Actions</text>
  <text x="78" y="318" fill="#E6EDF3" font-size="74" font-weight="800" letter-spacing="-1.5">Gateway</text>

  <!-- Tagline -->
  <text x="80" y="372" fill="#ADBAC7" font-size="26" font-weight="400">Oversubscribe a shared quota without starving expensive runners —</text>
  <text x="80" y="410" fill="#2DD4BF" font-size="27" font-weight="600">higher utilization, lower cost.</text>
  <text x="80" y="448" fill="#8B949E" font-size="22" font-weight="400">An Actions Runner Controller (ARC) alternative.</text>

  <!-- Feature pills (ARC differentiators) — row spans the 80px content margins (x=80 → x=1200) -->
  <g font-size="19" font-weight="600">
    <g>
      <rect x="80"  y="472" width="304" height="50" rx="25" fill="#11202E" stroke="#234055" stroke-width="1.5"/>
      <text x="232" y="504" fill="#9FE7DC" text-anchor="middle">Floor + opportunistic burst</text>
    </g>
    <g>
      <rect x="398" y="472" width="224" height="50" rx="25" fill="#11202E" stroke="#234055" stroke-width="1.5"/>
      <text x="510" y="504" fill="#9FB8F0" text-anchor="middle">Auto eviction retry</text>
    </g>
    <g>
      <rect x="636" y="472" width="274" height="50" rx="25" fill="#11202E" stroke="#234055" stroke-width="1.5"/>
      <text x="773" y="504" fill="#9FE7DC" text-anchor="middle">Per-team IP allowlisting</text>
    </g>
    <g>
      <rect x="924" y="472" width="276" height="50" rx="25" fill="#11202E" stroke="#234055" stroke-width="1.5"/>
      <text x="1062" y="504" fill="#9FB8F0" text-anchor="middle">4,000&#215; lighter listeners</text>
    </g>
  </g>

  <!-- Right-side four-tier motif -->
  <g transform="translate(964, 196)">
    <text x="118" y="-24" fill="#566273" font-size="18" font-weight="600" letter-spacing="2" text-anchor="middle">FOUR TIERS</text>
    <rect x="0"  y="0"   width="236" height="44" rx="8" fill="url(#tier)" opacity="1.00"/>
    <rect x="0"  y="56"  width="236" height="44" rx="8" fill="url(#tier)" opacity="0.82"/>
    <rect x="0"  y="112" width="236" height="44" rx="8" fill="url(#tier)" opacity="0.64"/>
    <rect x="0"  y="168" width="236" height="44" rx="8" fill="url(#tier)" opacity="0.46"/>
    <g fill="#0B1220" font-size="17" font-weight="700">
      <text x="118" y="28"  text-anchor="middle">Gateway Manager</text>
      <text x="118" y="84"  text-anchor="middle">Gateway Controller</text>
      <text x="118" y="140" text-anchor="middle">Egress Proxy</text>
      <text x="118" y="196" text-anchor="middle">Worker Pod</text>
    </g>
  </g>

  <!-- Footer / repo handle -->
  <text x="80" y="586" fill="#566273" font-size="22" font-weight="500">github.com/actions-gateway/github-actions-gateway</text>
</svg>
