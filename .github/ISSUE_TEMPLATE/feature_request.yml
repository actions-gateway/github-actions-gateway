name: Feature request
description: Suggest an enhancement or new capability.
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please check [`DESIGN.md`](https://github.com/actions-gateway/github-actions-gateway/blob/main/DESIGN.md)
        and the [`docs/design/`](https://github.com/actions-gateway/github-actions-gateway/tree/main/docs/design)
        tree first — the four-tier architecture has load-bearing constraints around egress isolation,
        zero-idle compute, and multi-tenant security that shape what changes fit.

        Search [existing issues](https://github.com/actions-gateway/github-actions-gateway/issues?q=is%3Aissue)
        to avoid duplicates.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to accomplish? What's the pain with the current behavior?
      placeholder: As an operator, I can't ... which means ...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Sketch the behavior, API, or config surface.
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system would this affect? Pick the closest match.
      options:
        - "Unsure / multiple"
        - "Gateway Manager Controller (GMC)"
        - "Actions Gateway Controller (AGC)"
        - "Broker"
        - "GitHub App integration (githubapp)"
        - "Egress proxy"
        - "Worker pods"
        - "Probe"
        - "Helm chart"
        - "Documentation"
        - "CI / build / release"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one is preferable.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this is not a duplicate.
          required: true
        - label: This proposal does not regress a security property as a default (or I've called out the trade-off above).
          required: true
