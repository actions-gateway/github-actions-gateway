name: pages
on:
  pull_request:
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'overrides/**'
      - 'requirements-docs.txt'
      - '.github/workflows/pages.yml'
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'overrides/**'
      - 'requirements-docs.txt'
      - '.github/workflows/pages.yml'
  # The site is launched (Q129). Deploy now runs automatically on push to main
  # (see the deploy job's `if`): merging docs changes publishes them to
  # https://actions-gateway.com with no manual step. workflow_dispatch remains
  # available for an on-demand redeploy. pull_request only validates that the
  # site builds; it never publishes.
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.x'
      - run: pip install -r requirements-docs.txt
      - run: mkdocs build --site-dir _site
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
