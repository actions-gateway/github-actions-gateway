name: dockerfile-lint
on:
  pull_request:
    paths:
      - '**/Dockerfile'
      - '.hadolint.yaml'
      - '.github/workflows/dockerfile-lint.yml'
  push:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '.hadolint.yaml'
      - '.github/workflows/dockerfile-lint.yml'

# Cancel superseded runs of this workflow on the same PR; pushes to main are
# never cancelled (each is a distinct post-merge gate). Keyed on github.ref —
# for a PR that is the unique refs/pull/<n>/merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Lint every Dockerfile with hadolint. All six currently pass at the strictest
# (style) threshold, so failure-threshold is set there to catch any regression —
# missing digest pins, a relaxed USER, an unpinned base tag — at PR time.
# (scripts/dogfood/runner/Dockerfile is a dev/reference image, not a shipped one,
# but it's gated too so the example people copy stays lint-clean.)
jobs:
  hadolint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - cmd/gmc/Dockerfile
          - cmd/agc/Dockerfile
          - cmd/proxy/Dockerfile
          - cmd/worker/Dockerfile
          - test/fakegithub/Dockerfile
          - scripts/dogfood/runner/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: hadolint ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: style
