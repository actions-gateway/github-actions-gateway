name: dockerfile-lint
on:
  pull_request:
    paths:
      - '**/Dockerfile'
      - '.hadolint.yaml'
      - '.github/workflows/dockerfile-lint.yml'
  push:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - '.hadolint.yaml'
      - '.github/workflows/dockerfile-lint.yml'

# Cancel superseded runs of this workflow on the same PR; pushes to main are
# never cancelled (each is a distinct post-merge gate). Keyed on github.ref —
# for a PR that is the unique refs/pull/<n>/merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Lint every Dockerfile with hadolint. All five currently pass at the strictest
# (style) threshold, so failure-threshold is set there to catch any regression —
# missing digest pins, a relaxed USER, an unpinned base tag — at PR time.
jobs:
  hadolint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        dockerfile:
          - cmd/gmc/Dockerfile
          - cmd/agc/Dockerfile
          - cmd/proxy/Dockerfile
          - cmd/worker/Dockerfile
          - test/fakegithub/Dockerfile
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: hadolint ${{ matrix.dockerfile }}
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: style
