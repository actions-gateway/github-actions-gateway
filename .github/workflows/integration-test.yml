on:
  pull_request:
  push:
    branches: [main]
jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build setup-envtest
        run: make setup-envtest
      - name: Install envtest binaries
        run: |
          KUBEBUILDER_ASSETS=$(.build/setup-envtest use --bin-dir /tmp/envtest-bins -p path)
          echo "KUBEBUILDER_ASSETS=$KUBEBUILDER_ASSETS" >> "$GITHUB_ENV"
      - name: Run GMC integration tests
        run: go test -v -tags integration -timeout 5m -count=1 ./internal/controller/integration/...
        working-directory: cmd/gmc
      - name: Run AGC integration tests
        run: go test -v -tags integration -timeout 5m -count=1 ./internal/controller/integration/...
        working-directory: cmd/agc
