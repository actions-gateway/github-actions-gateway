on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Cancel superseded runs of this workflow on the same PR; pushes to main are
# never cancelled (each is a distinct post-merge gate). Keyed on github.ref —
# for a PR that is the unique refs/pull/<n>/merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fine-grained path gate. The coarse paths-ignore above still lets non-code,
  # non-docs files (e.g. .gitignore, LICENSE) trigger this workflow, so classify
  # the diff and skip the test job when no code changed. Mirrors e2e-test.yml.
  # On push to main the job always runs, so the output only matters on PRs.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'broker/**'
              - 'cmd/**'
              - 'githubapp/**'
              - 'test/**'
              - 'vendor/**'
              - 'go.work'
              - 'go.work.sum'
              - 'Makefile'
              - '.github/workflows/integration-test.yml'

  integration-test:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # ENVTEST_K8S_VERSION pins the Kubernetes API-server version the integration
    # tier tests against. Single-sourced here (the cache key + the `use` below both
    # read it) and kept in lockstep with the same pin in cmd/{gmc,agc}/Makefile by
    # updatecli (updatecli.d/envtest.yaml, weekly), which rewrites all three. It is
    # the envtest twin of KIND_NODE_IMAGE — keep the two on the same Kubernetes
    # minor so the integration and e2e tiers test the same version. Multi-gateway
    # AGC scoping (KEP-4358 field selectors) needs ≥ 1.31; older fails the field
    # selector. The ".x" patch wildcard lets setup-envtest pick the newest patch.
    env:
      ENVTEST_K8S_VERSION: 1.35.x
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
      - name: Build setup-envtest
        run: make setup-envtest
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/envtest-bins
          key: envtest-${{ runner.os }}-${{ env.ENVTEST_K8S_VERSION }}
      - name: Install envtest binaries
        run: |
          KUBEBUILDER_ASSETS=$(.build/setup-envtest use "$ENVTEST_K8S_VERSION" --bin-dir /tmp/envtest-bins -p path)
          echo "KUBEBUILDER_ASSETS=$KUBEBUILDER_ASSETS" >> "$GITHUB_ENV"
      - name: Run GMC integration tests
        run: go test -race -v -tags integration -timeout 5m -count=1 ./internal/controller/integration/...
        working-directory: cmd/gmc
      - name: Run AGC integration tests
        run: go test -race -v -tags integration -timeout 5m -count=1 ./internal/controller/integration/...
        working-directory: cmd/agc
