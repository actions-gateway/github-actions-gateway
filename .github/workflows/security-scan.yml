name: security-scan

# Two independent supply-chain gates that the existing unit/integration/e2e
# workflows don't cover:
#   - govulncheck: per-module, workspace-aware scan for known vulnerabilities
#     reachable from our code (stdlib + dependency CVEs).
#   - trivy: scans every built image (OS packages + bundled Go libraries) for
#     fixable HIGH/CRITICAL CVEs.
# Both fail the PR so a regression cannot merge silently.
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Cancel superseded runs of this workflow on the same PR; pushes to main are
# never cancelled (each is a distinct post-merge gate). Mirrors unit-test.yml.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fine-grained path gate. The coarse paths-ignore above still lets non-code
  # files (e.g. .gitignore, LICENSE) trigger this workflow, so classify the diff
  # and skip the scan jobs when nothing they cover changed. Mirrors
  # unit-test.yml. On push to main the jobs always run.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      chart: ${{ steps.filter.outputs.chart }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'broker/**'
              - 'cmd/**'
              - 'githubapp/**'
              - 'test/**'
              - 'vendor/**'
              - 'go.work'
              - 'go.work.sum'
              - 'tools/**'
              - 'docker-bake.hcl'
              - 'Makefile'
              - 'scripts/go-vulncheck.sh'
              - 'scripts/lib/**'
              - '.github/workflows/security-scan.yml'
            chart:
              - 'charts/**'
              - 'Makefile'
              - 'scripts/polaris-scan.sh'
              - 'scripts/lib/**'
              - '.github/workflows/security-scan.yml'

  # govulncheck is symbol-precise: it only fails on vulnerabilities actually
  # reachable from our code, not every CVE in the dependency graph. Run it per
  # workspace module (it is module-scoped) mirroring the lint job's loop.
  govulncheck:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
      # `make vulncheck` (scripts/go-vulncheck.sh) is the single source of truth
      # for the per-module loop, so local and CI verdicts match. It builds
      # .build/govulncheck from the vendored tools/ module first.
      - name: run govulncheck across workspace modules
        run: make vulncheck

  # Build each image, scan it, and generate its SBOM. One matrix leg per
  # Dockerfile so a finding points straight at the offending image and the five
  # builds run in parallel. The SBOM is generated from the same build — a PR-time
  # check so SBOM generation can't silently break before a release. It is
  # uploaded as a build artifact only; SIGNING and attaching the SBOM as a cosign
  # attestation to a PUBLISHED image happen in publish.yml (needs a registry push
  # + OIDC), never on PRs.
  #
  # exit-code per leg: the four images we build FROM a minimal/distroless base
  # block the PR (exit-code 1) — their only packages are ones we chose, so a
  # finding is actionable here. The worker image is built FROM the upstream
  # ghcr.io/actions/actions-runner and inherits dozens of HIGH/CRITICAL CVEs in
  # the bundled node20 runtime and the runner's own Go binaries that we cannot
  # fix without forking the runner. Gating PRs on those would red-gate unrelated
  # work, so worker is report-only (exit-code 0): findings are printed for
  # visibility but never block. Runner-base CVEs are addressed by bumping the
  # pinned tag (tracked via the dependabot 'docker' ecosystem + Q70).
  trivy:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      # Buildkit image docker/setup-buildx-action boots its builder from; named
      # here so the pre-pull step and the builder pin reference one source.
      # DIGEST-PINNED (Q151): the buildx-stable-1 tag floats, so an unpinned
      # reference would let the builder that assembles the scanned images change
      # underfoot between runs. Pin by digest, kept in step with the e2e and
      # publish workflows by updatecli.d/buildkit.yaml.
      BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: gmc
            dockerfile: cmd/gmc/Dockerfile
            exit-code: '1'
          - name: agc
            dockerfile: cmd/agc/Dockerfile
            exit-code: '1'
          - name: proxy
            dockerfile: cmd/proxy/Dockerfile
            exit-code: '1'
          - name: fakegithub
            dockerfile: test/fakegithub/Dockerfile
            exit-code: '1'
          - name: worker
            dockerfile: cmd/worker/Dockerfile
            # report-only — see the per-leg exit-code note on the job above.
            exit-code: '0'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Pre-pull buildkit builder image
        # docker/setup-buildx-action boots its docker-container builder from
        # ${BUILDKIT_IMAGE}, pulled from Docker Hub with no retry of its own — a
        # timeout/rate-limit flake source. Pre-pull with retries so the buildx
        # boot below finds it in the local image cache and never touches Hub.
        run: scripts/pull-image-with-retry.sh "${BUILDKIT_IMAGE}"
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          # Pin the builder to the buildkit image pre-pulled above so the boot
          # uses the local cache instead of pulling from Docker Hub.
          driver-opts: image=${{ env.BUILDKIT_IMAGE }}
      - name: build ${{ matrix.name }} image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: local/${{ matrix.name }}:scan
          # Read-only reuse of the e2e bake's gha cache scopes (docker-bake.hcl);
          # no cache-to so these scan builds never evict the e2e build cache.
          cache-from: type=gha,scope=${{ matrix.name }}
      # Generate an SPDX-JSON SBOM for the image we just built and upload it as a
      # build artifact. Runs right after the build (before the trivy scan) so a
      # CVE-induced scan failure never suppresses SBOM generation. This is the
      # PR-time exercise of the SBOM path; publish.yml regenerates the SBOM for
      # the pushed image and attaches it as a keyless cosign attestation.
      - name: generate SBOM for ${{ matrix.name }}
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: local/${{ matrix.name }}:scan
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
          artifact-name: sbom-${{ matrix.name }}.spdx.json
      # Cache trivy's data dir (vuln DB + scan cache) so each run avoids
      # re-pulling the ~50 MB DB from the registry — the DB pull is otherwise a
      # rate-limit flake source. The DB refreshes every few hours; the run_id
      # key always misses and writes a fresh entry, while restore-keys load the
      # most recent prior DB so a refresh is incremental, not a cold pull.
      - name: cache trivy data
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ github.workspace }}/.trivy-cache
          key: trivy-data-${{ github.run_id }}
          restore-keys: |
            trivy-data-
      - name: trivy scan ${{ matrix.name }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        env:
          TRIVY_CACHE_DIR: ${{ github.workspace }}/.trivy-cache
        with:
          image-ref: local/${{ matrix.name }}:scan
          format: table
          # Only fixable HIGH/CRITICAL findings fail the gate. ignore-unfixed
          # drops CVEs with no released fix (nothing actionable in this repo).
          # exit-code is per-leg (1 = block, 0 = report-only); see the job note.
          # Mirrors `make trivy-scan` so local and CI verdicts match.
          exit-code: ${{ matrix.exit-code }}
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          vuln-type: os,library

  # polaris audits the Kubernetes security/best-practice posture of the SHIPPED
  # install artifact: it renders the Helm chart (digest-pinned, matching the
  # production posture) and checks the rendered manifests. The gate fails on
  # `danger` findings only (privileged, host namespaces, dangerous capabilities,
  # missing securityContext, a floating :latest image tag, …) — a real security
  # regression in the chart cannot merge. `warning`-level findings are reported
  # for visibility but do not block; the handful that are false positives against
  # a Helm-packaged operator chart are tuned to `ignore` in
  # charts/actions-gateway/polaris.yaml, each with a justifying comment.
  # `make polaris-scan` runs this exact gate locally so local and CI verdicts
  # match. CIS-benchmark (kube-bench) posture is cluster-level and runs against a
  # live node, not static manifests — see docs/operations/security-operations.md
  # for that operator runbook.
  polaris:
    needs: [changes]
    if: needs.changes.outputs.chart == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # Pin the polaris release scanned. Bump deliberately (new checks can change
      # the verdict); keep in step with the version `make polaris-scan` expects.
      # Auto-bumped by updatecli.d/polaris.yaml (version + matching SHA256).
      POLARIS_VERSION: v10.2.0
      # SHA256 of the polaris linux/amd64 tarball for POLARIS_VERSION, taken from
      # the release's published checksums.txt (Q127). Release assets are mutable
      # for an existing tag; verify before trusting. Bump alongside POLARIS_VERSION.
      POLARIS_SHA256: c264fc682fe612732e8a97680451d6e5f6b6fb920936215d6bb9ef387c7eadce
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: install polaris
        run: |
          set -euo pipefail
          # v10+ embeds the version (without the leading "v") in the asset name:
          # tag v10.2.0 -> polaris_10.2.0_linux_amd64.tar.gz. Strip the "v" to
          # build the asset filename from the tag.
          asset="polaris_${POLARIS_VERSION#v}_linux_amd64.tar.gz"
          curl -sSLf --retry 3 --retry-delay 2 -o "${RUNNER_TEMP}/polaris.tar.gz" \
            "https://github.com/FairwindsOps/polaris/releases/download/${POLARIS_VERSION}/${asset}"
          echo "${POLARIS_SHA256}  ${RUNNER_TEMP}/polaris.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/polaris.tar.gz" -C "${RUNNER_TEMP}" polaris
          sudo install "${RUNNER_TEMP}/polaris" /usr/local/bin/polaris
          polaris version
      - name: polaris posture scan (gate on danger findings)
        run: make polaris-scan
