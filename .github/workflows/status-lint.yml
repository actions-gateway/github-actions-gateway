name: status-lint
on:
  pull_request:
    paths:
      - 'docs/STATUS.md'
      - 'scripts/lint-status.sh'
      - '.github/workflows/status-lint.yml'
  push:
    branches: [main]
    paths:
      - 'docs/STATUS.md'
      - 'scripts/lint-status.sh'
      - '.github/workflows/status-lint.yml'

# Cancel superseded runs of this workflow on the same PR; pushes to main are
# never cancelled (each is a distinct post-merge gate). Keyed on github.ref —
# for a PR that is the unique refs/pull/<n>/merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint-status:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: lint docs/STATUS.md format
        run: scripts/lint-status.sh
