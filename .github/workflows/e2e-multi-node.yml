on:
  pull_request:
  push:
    branches: [main]

jobs:
  e2e-multi-node:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      GMC_IMG: gmc:e2e-${{ github.sha }}
      KIND_CLUSTER: actions-gateway-e2e-local

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Install kind
        run: |
          go install sigs.k8s.io/kind@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create kind cluster (3-node)
        run: make e2e-cluster KIND_CLUSTER=${{ env.KIND_CLUSTER }} KIND_CONFIG=test/kind-config.yaml

      - name: Build GMC image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/gmc/Dockerfile
          tags: ${{ env.GMC_IMG }}
          load: true
          cache-from: type=gha,scope=gmc
          cache-to: type=gha,mode=max,scope=gmc

      - name: Build AGC image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: cmd/agc/Dockerfile
          tags: agc:e2e
          load: true
          cache-from: type=gha,scope=agc
          cache-to: type=gha,mode=max,scope=agc

      - name: Build proxy image
        uses: docker/build-push-action@v6
        with:
          context: cmd/proxy
          file: cmd/proxy/Dockerfile
          tags: proxy:e2e
          load: true
          cache-from: type=gha,scope=proxy
          cache-to: type=gha,mode=max,scope=proxy

      - name: Build fakegithub image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: test/fakegithub/Dockerfile
          tags: fakegithub:e2e
          load: true
          cache-from: type=gha,scope=fakegithub
          cache-to: type=gha,mode=max,scope=fakegithub

      - name: Load images into kind cluster
        run: make e2e-load-images KIND_CLUSTER=${{ env.KIND_CLUSTER }}

      - name: Run multi-node e2e tests
        run: make e2e-multi-node KIND_CLUSTER=${{ env.KIND_CLUSTER }}

      - name: Upload e2e multi-node test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-local-junit-report
          path: /tmp/e2e-local-report.xml

      - name: Collect diagnostic info on failure
        if: failure()
        run: |
          echo "=== GMC pods ===" && kubectl get pods -n gmc-system -o wide || true
          echo "=== e2e-infra pods ===" && kubectl get pods -n e2e-infra -o wide || true
          echo "=== tenant namespaces ===" && kubectl get pods --all-namespaces -l 'actions-gateway.github.com/owner-name' -o wide || true
          echo "=== GMC controller logs ===" && kubectl logs -n gmc-system -l control-plane=controller-manager --tail=100 || true
          echo "=== fakegithub logs ===" && kubectl logs -n e2e-infra -l app=fakegithub --tail=100 || true
          echo "=== events ===" && kubectl get events --all-namespaces --sort-by=.lastTimestamp | tail -50 || true

      - name: Delete kind cluster
        if: always()
        run: make e2e-cluster-delete KIND_CLUSTER=${{ env.KIND_CLUSTER }}
