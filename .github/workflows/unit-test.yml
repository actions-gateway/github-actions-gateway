on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '!docs/STATUS.md'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '!docs/STATUS.md'

# Cancel superseded runs of this workflow on the same PR; pushes to main are
# never cancelled (each is a distinct post-merge gate). Keyed on github.ref —
# for a PR that is the unique refs/pull/<n>/merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fine-grained path gate. The coarse paths-ignore above still lets non-code,
  # non-docs files (e.g. .gitignore, LICENSE) trigger this workflow, so classify
  # the diff and skip the jobs when nothing they cover changed. Mirrors
  # e2e-test.yml. On push to main the jobs always run, so outputs only matter on PRs.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      status: ${{ steps.filter.outputs.status }}
      scripts: ${{ steps.filter.outputs.scripts }}
      vendor: ${{ steps.filter.outputs.vendor }}
      modules: ${{ steps.filter.outputs.modules }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            code:
              - 'broker/**'
              - 'cmd/**'
              - 'githubapp/**'
              - 'test/**'
              - 'vendor/**'
              - 'go.work'
              - 'go.work.sum'
              - 'tools/**'
              - '.golangci.yml'
              - 'Makefile'
              - 'scripts/coverage.sh'
              - 'scripts/go-test.sh'
              - 'scripts/go-lint.sh'
              - 'scripts/local-throttle.sh'
              - 'scripts/lib/**'
              - 'coverage-baseline.txt'
              - '.github/workflows/unit-test.yml'
            status:
              - 'docs/STATUS.md'
              - 'scripts/lint-status.sh'
              - '.github/workflows/unit-test.yml'
            scripts:
              - 'scripts/**'
              - 'Makefile'
              - '.github/workflows/unit-test.yml'
            # Vendor-integrity gate scope: anything that determines what the
            # committed vendor trees should contain. A pure .go edit can't change
            # vendor contents, so it's deliberately narrower than `code` to avoid
            # re-running the network re-vendor on every source change.
            vendor:
              - 'vendor/**'
              - 'tools/vendor/**'
              - '**/go.mod'
              - '**/go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'scripts/vendor-check.sh'
              - 'Makefile'
              - '.github/workflows/unit-test.yml'
            # Tidiness gate scope (Q94): anything that determines the tidy-canonical
            # shape of the workspace module files. Narrower than `vendor` — a
            # vendor/ source edit can't change what `go mod tidy` produces, so the
            # vendored trees are deliberately excluded here.
            modules:
              - '**/go.mod'
              - '**/go.sum'
              - 'go.work'
              - 'go.work.sum'
              - 'scripts/go-tidy-check.sh'
              - 'scripts/go-work-tidy.sh'
              - 'Makefile'
              - '.github/workflows/unit-test.yml'

  lint:
    needs: [changes]
    # gofmt/golangci need code; lint-status needs the STATUS.md filter.
    if: needs.changes.outputs.code == 'true' || needs.changes.outputs.status == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
      # setup-go caches $GOCACHE + modules but not the golangci-lint analyzer
      # cache, so every PR re-analyzes cold. Key invalidates on linter version
      # (tools/go.sum), config, or any module's deps changing.
      - name: cache golangci-lint analyzer
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('tools/go.sum', '.golangci.yml', '**/go.sum') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-
      # `make lint` (scripts/go-lint.sh) is the single source of truth for the
      # gofmt check and the per-module golangci-lint loop, so local and CI
      # verdicts match. It builds .build/golangci-lint from the vendored tools/
      # module first; its local throttle is a no-op here (CI env var is set).
      - name: gofmt + golangci-lint (make lint)
        run: make lint
      - name: lint STATUS.md
        run: make lint-status
      # Enforce a single Go version across go.work / all go.mod / all go.work.gen
      # (Q68). The go.work.gen files feed `make manifests` and have drifted before.
      - name: single Go version (make go-version-check)
        run: make go-version-check
  # Shellcheck the standalone helper scripts under scripts/. actionlint already
  # covers inline workflow `run:` blocks, but the tracked scripts/*.sh files ship
  # unlinted otherwise. Isolated from the `lint` job so a scripts-only change does
  # not also trigger the full Go lint. `make shellcheck` (scripts/
  # shellcheck-scripts.sh) is the single source of truth for the glob (tracked
  # scripts/*.sh, recursive).
  shellcheck:
    needs: [changes]
    if: needs.changes.outputs.scripts == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Pin the shellcheck version rather than using ubuntu-latest's preinstalled
    # one: that version drifts with the runner image and its SC2015-style
    # heuristics differ between releases, so an unpinned gate gives a different
    # verdict locally vs. CI. Pinning makes `make shellcheck` reproducible; devs
    # install the same version to match (see docs/development/testing.md).
    env:
      SHELLCHECK_VERSION: v0.11.0
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: install pinned shellcheck
        run: |
          set -euo pipefail
          base="shellcheck-${SHELLCHECK_VERSION}"
          url="https://github.com/koalaman/shellcheck/releases/download/${SHELLCHECK_VERSION}/${base}.linux.x86_64.tar.xz"
          for attempt in 1 2 3; do
            if curl -fsSL "$url" -o "$RUNNER_TEMP/sc.tar.xz"; then break; fi
            echo "download attempt $attempt failed; retrying" >&2; sleep 5
          done
          tar -xf "$RUNNER_TEMP/sc.tar.xz" -C "$RUNNER_TEMP"
          sudo install "$RUNNER_TEMP/${base}/shellcheck" /usr/local/bin/shellcheck
          shellcheck --version
      - name: shellcheck scripts
        run: make shellcheck
      - name: scripts behavioural tests (make scripts-test)
        # Pure-bash assertions shellcheck can't express — currently the tags-only
        # release signing-identity regexp (Q124). Same job as shellcheck since
        # both gate the scripts/ tree on a scripts-only change.
        run: make scripts-test
  # Supply-chain integrity gate for the committed vendor trees (Q126). `go build
  # -mod=vendor` only checks vendor/modules.txt consistency, never that the
  # vendored source matches the go.sum hashes — so a tampered vendor/ edit would
  # ship into the signed release images undetected. `make vendor-check` re-runs
  # the workspace-vendor flow (re-fetching every module verified against go.sum)
  # and fails on any drift vs the committed trees. Isolated from unit-test so a
  # vendor/go.mod-only change doesn't also trigger the -race suite, and vice
  # versa. A Dependabot go.mod bump legitimately fails here until a follow-up
  # vendor sync lands — that's the intended signal (see scripts/vendor-check.sh).
  vendor-check:
    needs: [changes]
    if: needs.changes.outputs.vendor == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
      # `make vendor-check` (scripts/vendor-check.sh) is the single source of
      # truth so the local and CI verdicts match. It re-fetches modules from the
      # proxy (verified against go.sum) when the setup-go module cache misses,
      # else re-vendors offline from cache; either way the git diff is the gate.
      - name: vendor integrity vs go.sum (make vendor-check)
        run: make vendor-check

  # Tidiness gate for the workspace module files (Q94). A non-canonical committed
  # go.sum makes the documented tidy flow (scripts/go-work-tidy.sh + go work sync)
  # re-add the /go.mod hash rows to broker/probe/proxy/githubapp and re-resolve
  # cmd/gmc's stale indirect requires, so contributors keep reverting spurious
  # diffs. `make tidy-check` re-runs that flow and fails on any go.mod/go.sum/
  # go.work.sum drift, keeping the committed files tidy-canonical. Sibling of
  # vendor-check (Q126): this gates the module files, vendor-check gates that
  # vendor/ matches them. Isolated as its own job (and its own narrower `modules`
  # path filter) so a vendor-only or source-only change doesn't trigger the tidy
  # re-run, and vice versa.
  tidy-check:
    needs: [changes]
    if: needs.changes.outputs.modules == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
      # `make tidy-check` (scripts/go-tidy-check.sh) is the single source of truth
      # so the local and CI verdicts match. It re-runs the documented tidy flow;
      # on a cold module cache `go mod tidy` re-fetches the build-graph go.mod
      # files (verified against go.sum), else tidies offline. The git diff is the
      # gate.
      - name: module files are tidy (make tidy-check)
        run: make tidy-check

  unit-test:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    # -race roughly doubles unit runtime vs. plain `go test`, so allow more
    # headroom than the lint job. The race detector needs cgo, which the
    # ubuntu-latest image's gcc satisfies out of the box.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
      # Run the per-module unit tests under the race detector. `make test-race`
      # is the single source of truth for the race flags/timeout; its throttle
      # prefix is a no-op on CI (the CI env var is set), so this runs at full
      # speed here while staying desktop-safe when invoked locally.
      - name: run unit tests (-race)
        run: make test-race

  # Coverage no-regression ratchet. Separate from unit-test (which runs -race):
  # this re-runs the unit tests with -cover (no race) and fails only if a
  # module's coverage drops below the floor recorded in coverage-baseline.txt
  # minus a small tolerance. `make cover-check` is the single source of truth
  # for the measurement and gate. See docs/plan/release-1.0.md §F and
  # docs/development/testing.md. Runs in parallel with unit-test rather than
  # chained after it so the race gate's latency isn't serialized behind a second
  # (uninstrumented) test run.
  coverage:
    needs: [changes]
    if: needs.changes.outputs.code == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.work
      - name: coverage ratchet (make cover-check)
        run: make cover-check
