on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '!docs/STATUS.md'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '!docs/STATUS.md'
jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
      - name: gofmt
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l $(go work edit -json | jq -r '.Use[].DiskPath'))
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "$unformatted"
            echo "run: gofmt -s -w <file>"
            exit 1
          fi
      # setup-go caches $GOCACHE + modules but not the golangci-lint analyzer
      # cache, so every PR re-analyzes cold. Key invalidates on linter version
      # (tools/go.sum), config, or any module's deps changing.
      - name: cache golangci-lint analyzer
        uses: actions/cache@v4
        with:
          path: ~/.cache/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ hashFiles('tools/go.sum', '.golangci.yml', '**/go.sum') }}
          restore-keys: |
            golangci-lint-${{ runner.os }}-
      - name: golangci-lint
        run: |
          set -euo pipefail
          make golangci-lint
          for dir in $(go work edit -json | jq -r '.Use[].DiskPath'); do
            echo "==> golangci-lint $dir"
            (cd "$dir" && "$GITHUB_WORKSPACE/.build/golangci-lint" run --config "$GITHUB_WORKSPACE/.golangci.yml" ./...)
          done
      - name: lint STATUS.md
        run: make lint-status
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.work
      - name: run unit tests
        run: |
          go work edit -json | jq -r '.Use[].DiskPath' | while read -r dir; do
            (cd "$dir" && go test -timeout 2m ./...)
          done
