on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: run unit tests
        run: |
          GOWORK=off go test -timeout 2m ./...
          go work edit -json | jq -r '.Use[].DiskPath' | while read -r dir; do
            (cd "$dir" && go test -timeout 2m ./...)
          done
