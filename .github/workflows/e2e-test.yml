on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Cancel an in-progress e2e run when a newer commit is pushed to the same PR —
# the old run's result is moot and finishing it just burns ~35 min of runner
# time. cancel-in-progress is gated to pull_request events so pushes to main
# (each a distinct ref, and a post-merge gate worth keeping) are never cancelled.
# Keyed on github.ref (not head_ref): for a PR this is the unique
# refs/pull/<n>/merge, so an attacker cannot pick a colliding branch name to
# cancel another PR's runs the way a head_ref (source branch name) key allows.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Detect which files changed so the e2e job can be skipped on PRs that
  # touch only CI configs for other suites, .claude/, etc.  Pushes to main
  # always run regardless of this filter.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            e2e:
              - 'cmd/**'
              - 'broker/**'
              - 'githubapp/**'
              - 'test/**'
              - 'vendor/**'
              - 'go.work'
              - 'go.work.sum'
              - 'scripts/**'
              # Dogfood/GKE tooling is never exercised by the kind e2e job (it
              # provisions the GAG-hosted DinD runner, a separate deploy target),
              # so a change there must not trigger this job. dorny/paths-filter
              # evaluates '!' negations in order after the includes above.
              - '!scripts/dogfood/**'
              - 'Makefile'
              - 'docker-bake.hcl'
              - '.github/workflows/e2e-test.yml'
              - '.github/workflows/e2e-reusable.yml'

  # The per-PR / push-to-main e2e leg: kindnet (kind's default CNI). The
  # cluster/image/test plumbing lives in the reusable workflow so the nightly
  # Calico lane (e2e-calico.yml) inherits the same setup without duplication.
  # kindnet accepts NetworkPolicy but does not enforce egress drops, so the
  # NetworkPolicy-enforcement negative specs self-skip here; the Calico lane
  # covers them (Q119).
  e2e:
    needs: [changes]
    # Always run on push to main; skip on PRs where no e2e-relevant files changed.
    if: needs.changes.outputs.e2e == 'true' || github.event_name == 'push'
    uses: ./.github/workflows/e2e-reusable.yml
    permissions:
      contents: read
    with:
      kind_cni: kindnet
