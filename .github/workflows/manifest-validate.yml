name: manifest-validate

# Validates the SHIPPED install artifact so a malformed RBAC/CRD/policy file
# cannot merge silently (Q66). The Helm chart is the SOLE install path (Q142);
# there is no kustomize overlay to render. Two layers, run by
# `make manifest-validate` so local and CI verdicts match:
#   - yamllint: catches ill-formed/ill-formatted YAML in the controller-gen
#     manifests under cmd/*/config/** and the chart metadata.
#   - kubeconform: schema-validates the controller-gen manifests (the codegen +
#     envtest substrate) and `helm template` output in digest-pinned, dev/test
#     opt-out, and all-features form against the Kubernetes API, plus `helm lint`
#     on the chart itself and a fail-closed check that a default-values render
#     (no gmc.image.digest) is REJECTED, so GMC image digest pinning cannot
#     regress to fail-open (Q96). The chart CRD/RBAC/webhook drift gates
#     (sync-chart-{crds,rbac,webhook}.sh --check) run first inside
#     `make manifest-validate`.
on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

# Cancel superseded runs of this workflow on the same PR; pushes to main are
# never cancelled (each is a distinct post-merge gate). Mirrors unit-test.yml.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Fine-grained path gate. The coarse paths-ignore above still lets non-manifest
  # files (e.g. .gitignore) trigger this workflow, so classify the diff and skip
  # the validate job when nothing it covers changed. Mirrors security-scan.yml.
  # On push to main the job always runs.
  changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      manifests: ${{ steps.filter.outputs.manifests }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            manifests:
              - 'cmd/agc/config/**'
              - 'cmd/gmc/config/**'
              - 'charts/**'
              - '.yamllint.yaml'
              - 'Makefile'
              - 'scripts/manifest-validate.sh'
              - 'scripts/sync-chart-crds.sh'
              - 'scripts/sync-chart-rbac.sh'
              - 'scripts/sync-chart-webhook.sh'
              - 'scripts/lib/**'
              - '.github/workflows/manifest-validate.yml'

  validate:
    needs: [changes]
    if: needs.changes.outputs.manifests == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      # Pinned tool versions. Bump deliberately (a new kubeconform can change
      # validation behaviour); keep in step with the versions
      # `make manifest-validate` is documented against in docs/development/testing.md.
      KUBECONFORM_VERSION: v0.6.7
      # SHA256 of kubeconform-linux-amd64.tar.gz for KUBECONFORM_VERSION (Q127).
      # Release assets are mutable for an existing tag; verify before trusting.
      # Bump this digest alongside KUBECONFORM_VERSION.
      KUBECONFORM_SHA256: 95f14e87aa28c09d5941f11bd024c1d02fdc0303ccaa23f61cef67bc92619d73
      YAMLLINT_VERSION: 1.37.1
      # Persist kubeconform's downloaded JSON schemas between runs so each run
      # does not re-fetch the schema set from GitHub (a rate-limit flake source).
      KUBECONFORM_CACHE: ${{ github.workspace }}/.kubeconform-cache
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: install yamllint
        run: python3 -m pip install --user "yamllint==${YAMLLINT_VERSION}"
      - name: install kubeconform
        run: |
          set -euo pipefail
          curl -sSLf --retry 3 --retry-delay 2 -o "${RUNNER_TEMP}/kubeconform.tar.gz" \
            "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
          echo "${KUBECONFORM_SHA256}  ${RUNNER_TEMP}/kubeconform.tar.gz" | sha256sum -c -
          tar -xzf "${RUNNER_TEMP}/kubeconform.tar.gz" -C "${RUNNER_TEMP}" kubeconform
          sudo install "${RUNNER_TEMP}/kubeconform" /usr/local/bin/kubeconform
          kubeconform -v
      # Cache kubeconform's schema dir keyed on the validated Kubernetes version.
      # The schema set for a fixed version is immutable, so a hit makes the run
      # fully offline; the key changes only when MANIFEST_K8S_VERSION (pinned in
      # scripts/manifest-validate.sh) does.
      - name: cache kubeconform schemas
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.KUBECONFORM_CACHE }}
          key: kubeconform-schemas-1.30.0
      - name: validate install artifact
        run: |
          set -euo pipefail
          mkdir -p "${KUBECONFORM_CACHE}"
          export PATH="${HOME}/.local/bin:${PATH}"  # pip --user yamllint
          make manifest-validate
