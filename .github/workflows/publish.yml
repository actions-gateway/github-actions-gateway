name: publish

# Build, push, sign, and SBOM-attest the four first-party images on a release.
#
# Images are MULTI-ARCH (linux/amd64 + linux/arm64, Q97): each push produces an
# OCI image index, and the digest recorded everywhere (signature, run summary,
# chart pins) is the INDEX digest — the kubelet resolves the per-arch manifest
# from it at pull time. The Dockerfiles cross-compile Go in a $BUILDPLATFORM
# builder stage and the runtime stages are COPY-only, so no QEMU setup is needed.
#
# Signing is KEYLESS (sigstore/Fulcio via GitHub Actions OIDC, id-token: write):
# cosign exchanges the short-lived OIDC token for an ephemeral Fulcio certificate
# and records the signature in the public Rekor transparency log. There is NO
# long-lived signing key and NO stored signing secret — the project forbids
# secrets-as-config, and keyless is the secure-by-default approach. Each image is
# signed RECURSIVELY (the index and every per-arch manifest), and an SPDX-JSON
# SBOM (generated with syft, one per architecture) is attached to each per-arch
# manifest as a cosign attestation, itself keyless-signed.
#
# A signed SLSA BUILD-PROVENANCE attestation (actions/attest-build-provenance,
# Q103) is also attached to each image's index digest as an OCI referrer. It
# travels the SAME keyless path — ambient OIDC → Fulcio cert → Rekor — so the
# provenance is authenticated (SLSA Build L2), not the unsigned, overwritable
# attestation buildx emits by default (which we disable). Reaching SLSA Build
# L3 would additionally need an isolated reusable-workflow builder.
#
# This runs ONLY on a v* tag push (or manual dispatch) — i.e. on PUBLISH, not on
# PRs. PR CI (security-scan.yml) builds each image and generates its SBOM so that
# path can't silently break, but it does NOT push, sign, or attest: signing needs
# a registry push and the ambient OIDC identity that only this workflow has. PR CI
# therefore does not exercise the cosign sign/attest steps — they are first
# exercised when a tag is published.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag to publish (e.g. v1.0.0). Defaults to the git ref name.'
        required: false

# Workflow-default permissions are read-only; each job widens only what it needs.
permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  # Buildkit image docker/setup-buildx-action boots its builder from; pre-pulled
  # with retry below so the buildx boot never touches Docker Hub uncached.
  # DIGEST-PINNED (Q127): the `buildx-stable-1` tag floats, so an unpinned
  # reference would let the builder that assembles signed release images change
  # underfoot. Pin it by digest; updatecli.d/buildkit.yaml (Q151) resolves the
  # tag's current digest and auto-bumps it here and in the e2e/security-scan
  # workflows together so the three pins can't drift.
  BUILDKIT_IMAGE: moby/buildkit:buildx-stable-1@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read # checkout
      packages: write # push images, signatures, and attestations to GHCR
      id-token: write # KEYLESS cosign + provenance — mint the OIDC token Fulcio signs against
      attestations: write # actions/attest-build-provenance writes the signed SLSA provenance
    strategy:
      fail-fast: false
      # One leg per first-party Dockerfile. fakegithub is a test fixture, not a
      # published artifact, so it is intentionally absent.
      matrix:
        include:
          - name: gmc
            dockerfile: cmd/gmc/Dockerfile
          - name: agc
            dockerfile: cmd/agc/Dockerfile
          - name: proxy
            dockerfile: cmd/proxy/Dockerfile
          - name: worker
            dockerfile: cmd/worker/Dockerfile
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve publish tag
        id: tag
        # On a tag push GITHUB_REF_NAME is the tag; workflow_dispatch may override
        # it via the `tag` input. Refuse to publish from a non-tag ref with no
        # explicit input so a manual run on a branch can't push a junk image tag.
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          # Defense in depth (Q124): the sign step below uses the ambient release
          # OIDC identity, whose Fulcio cert records the ref this run executed
          # from. Refuse any non-tag ref so a workflow_dispatch from a branch can
          # never reach the sign step and mint a `refs/heads/...` signature.
          # verify-release.sh anchors to `@refs/tags/v.*` and would reject such a
          # signature anyway; this stops it before a malicious image is pushed.
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "refusing to publish: ref '${GITHUB_REF}' is not a tag; publish runs only on v* tags" >&2
            exit 1
          fi
          tag="${INPUT_TAG:-}"
          if [[ -z "${tag}" ]]; then
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ "${tag}" != v* ]]; then
            echo "refusing to publish: resolved tag '${tag}' is not a v* version" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
      - name: Pre-pull buildkit builder image
        run: scripts/pull-image-with-retry.sh "${BUILDKIT_IMAGE}"
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          driver-opts: image=${{ env.BUILDKIT_IMAGE }}
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=sha,format=long
      - name: Build and push ${{ matrix.name }}
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          # Multi-arch (Q97): both platforms on every release. The result is an
          # OCI image index; steps.build.outputs.digest below is the INDEX
          # digest — the ref operators pin in chart values. No QEMU: the
          # Dockerfiles cross-compile Go on $BUILDPLATFORM and the runtime
          # stages are COPY-only.
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Mirror docker-bake.hcl's provenance args so the OCI image.* labels are
          # stamped from this build's commit and the release version.
          build-args: |
            REVISION=${{ github.sha }}
            VERSION=${{ steps.tag.outputs.tag }}
          # Release images build every layer from source — NO build cache
          # (Q127). A `cache-from: type=gha` would let layers of a signed,
          # released image be served from the PR-populated GHA BuildKit cache
          # rather than the tagged source: a poisoned cache entry (writable by any
          # PR build) would be baked into the release and keyless-signed as the
          # publish identity. `no-cache: true` closes that supply-chain surface;
          # the extra build minutes are acceptable on the rare release path.
          no-cache: true
          # Disable buildx's default provenance attestation (mode=max for public
          # repos): it is UNSIGNED and would embed extra attestation manifests in
          # the index. The authenticated, Rekor-logged SLSA provenance comes from
          # the attest-build-provenance step below instead, keeping the index the
          # two arch manifests the SBOM/sign steps assume.
          provenance: false
      - name: Attest build provenance (signed, keyless)
        # Signed SLSA build-provenance for the pushed multi-arch INDEX (the digest
        # operators pin). KEYLESS, mirroring the cosign flow: the action mints the
        # ambient GitHub OIDC token (id-token: write), exchanges it for a
        # short-lived Fulcio cert, and records the in-toto SLSA provenance
        # predicate in Rekor — no key material. push-to-registry attaches the
        # attestation to GHCR as an OCI referrer of the index digest (needs
        # packages: write + attestations: write), so a consumer resolves it from
        # the same ref. This authenticated provenance — not buildx's unsigned
        # default (disabled above) — is what backs the images' SLSA claim
        # (SLSA Build L2; see docs/operations/release.md).
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the signer version (the action otherwise floats to latest). Keep
          # in step with COSIGN_VERSION in the Makefile so a local
          # `make verify-release` verifies with the same version that signed.
          cosign-release: v2.5.2
      - name: Install syft
        id: syft
        # download-syft only (no scan): the wrapping sbom-action has no
        # per-platform mode, and a single syft scan of a multi-arch index
        # silently picks ONE platform — the other arch's attestation would
        # carry the wrong package list. The step below loops the platforms.
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          # Pin the syft version explicitly: the action otherwise resolves syft
          # at runtime and would float to a newer release between otherwise
          # identical builds, changing the bytes that scan the release images.
          # This is a runtime tool download, not a SHA-pinnable action, so
          # Dependabot can't bump it — bump by hand alongside the action SHA.
          syft-version: v1.45.1
      - name: Generate per-arch SBOMs (SPDX-JSON) for the pushed image
        id: sbom
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          INDEX_DIGEST: ${{ steps.build.outputs.digest }}
          SYFT: ${{ steps.syft.outputs.cmd }}
        run: |
          set -euo pipefail
          # One SBOM per architecture, scanned from that arch's exact manifest
          # digest (resolved from the index the push produced — never from the
          # floating tag). The digests are exported as step outputs so the
          # attest step below binds each SBOM to the same immutable manifest.
          for arch in amd64 arm64; do
            digest="$(docker buildx imagetools inspect --raw "${IMAGE}@${INDEX_DIGEST}" \
              | jq -r --arg arch "${arch}" \
                  '.manifests[] | select(.platform.os == "linux" and .platform.architecture == $arch) | .digest')"
            if [[ -z "${digest}" ]]; then
              echo "no linux/${arch} manifest found in index ${INDEX_DIGEST}" >&2
              exit 1
            fi
            "${SYFT}" "registry:${IMAGE}@${digest}" \
              -o "spdx-json=sbom-${{ matrix.name }}-${arch}.spdx.json"
            echo "digest-${arch}=${digest}" >> "${GITHUB_OUTPUT}"
          done
      - name: Upload SBOMs as run artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}-*.spdx.json
          if-no-files-found: error
      - name: Sign image + attest SBOMs (keyless)
        env:
          # Always reference the image by digest so the signature/attestation bind
          # to the exact bytes we pushed, not to whatever the tag resolves to later.
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}
          INDEX_DIGEST: ${{ steps.build.outputs.digest }}
          DIGEST_AMD64: ${{ steps.sbom.outputs.digest-amd64 }}
          DIGEST_ARM64: ${{ steps.sbom.outputs.digest-arm64 }}
        run: |
          set -euo pipefail
          # Keyless: cosign reads the ambient GitHub OIDC token (id-token: write),
          # obtains a short-lived Fulcio cert, and logs to Rekor. No key material.
          # scripts/retry.sh absorbs transient GHCR push errors (HTTP/2
          # INTERNAL_ERROR / 5xx) — sign and attest are idempotent.
          #
          # --recursive signs the index AND each per-arch child manifest, so
          # `cosign verify` succeeds against the index digest (what operators
          # pin) and against the per-arch digest a kubelet reports as imageID.
          scripts/retry.sh cosign sign --yes --recursive "${IMAGE}@${INDEX_DIGEST}"
          # Each arch's SBOM is attested onto that arch's manifest digest — the
          # precise binding. Note `cosign verify-attestation` therefore targets
          # a per-arch digest, not the index (see security-operations.md).
          scripts/retry.sh cosign attest --yes --type spdxjson \
            --predicate "sbom-${{ matrix.name }}-amd64.spdx.json" "${IMAGE}@${DIGEST_AMD64}"
          scripts/retry.sh cosign attest --yes --type spdxjson \
            --predicate "sbom-${{ matrix.name }}-arm64.spdx.json" "${IMAGE}@${DIGEST_ARM64}"
      - name: Record published digest in the run summary
        # Surface the immutable ref@digest (the multi-arch INDEX digest) in the
        # workflow summary so the release manager can copy it straight into the
        # GitHub Release notes and the `helm install --set <img>.image.digest=…`
        # pins. See the release runbook (docs/operations/release.md).
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.name }}@${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail
          # One bullet per matrix leg — legs run in parallel and can't share a
          # table header, so a bullet renders cleanly where a header-less table row
          # would not.
          printf -- '- **%s** — `%s`\n' "${{ matrix.name }}" "${IMAGE}" >> "${GITHUB_STEP_SUMMARY}"

  # Package, push, and keyless-sign the Helm chart as an OCI artifact to GHCR,
  # alongside the images. OCI (not a gh-pages chart repo) is chosen so the chart
  # reuses the SAME registry, GHCR login, and Fulcio/Rekor keyless-cosign flow as
  # the images — closing the supply-chain story with no separate hosting surface
  # or long-lived key. Artifact Hub (see Chart.yaml annotations) indexes the OCI
  # ref for discoverability. Like the image sign/attest steps, this is first
  # exercised on a v* tag publish, never on a PR. See docs/operations/release.md.
  chart-publish:
    # Runs only after every image leg succeeds, so a release never publishes a
    # chart whose referenced images failed to push.
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read # checkout
      packages: write # push the chart + its signature to GHCR
      id-token: write # KEYLESS cosign — same Fulcio/Rekor flow as the images
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve publish tag
        id: tag
        # Same guard as the image job: refuse to publish from a non-tag ref with
        # no explicit input so a manual run on a branch can't push a junk version.
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          set -euo pipefail
          # Defense in depth (Q124): reject non-tag refs so a branch dispatch
          # can't reach the keyless chart sign step. See the image job's note.
          if [[ "${GITHUB_REF}" != refs/tags/* ]]; then
            echo "refusing to publish: ref '${GITHUB_REF}' is not a tag; publish runs only on v* tags" >&2
            exit 1
          fi
          tag="${INPUT_TAG:-}"
          if [[ -z "${tag}" ]]; then
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ "${tag}" != v* ]]; then
            echo "refusing to publish: resolved tag '${tag}' is not a v* version" >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the signer version (the action otherwise floats to latest). Keep
          # in step with COSIGN_VERSION in the Makefile so a local
          # `make verify-release` verifies with the same version that signed.
          cosign-release: v2.5.2
      - name: Log in to GHCR (docker — for cosign)
        # cosign authenticates via the docker credential store
        # (~/.docker/config.json), NOT helm's separate OCI store, so it needs its
        # own login to read the manifest and push the signature. Without this,
        # `cosign sign` fails with "UNAUTHORIZED: authentication required" even
        # though `helm push` (which uses the helm login below) succeeds.
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Log in to GHCR (helm OCI)
        # helm keeps its OWN OCI credential store, so the docker login above does
        # not authenticate helm — log helm in explicitly too. Token on stdin keeps
        # it out of the process args/listing.
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          printf '%s' "${GHCR_TOKEN}" | helm registry login "${REGISTRY}" \
            --username "${ACTOR}" --password-stdin
      - name: Package, push, and sign the chart (keyless)
        id: chart
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # Chart SemVer has no leading 'v'. Derive both chart version and
          # appVersion from the release tag so the published artifact's version
          # always matches the release — no manual Chart.yaml bump to forget.
          version="${TAG#v}"
          repo="oci://${REGISTRY}/${OWNER}/charts"
          helm package charts/actions-gateway \
            --version "${version}" --app-version "${version}" \
            --destination "${RUNNER_TEMP}"
          pkg="${RUNNER_TEMP}/actions-gateway-${version}.tgz"
          # helm push prints "Digest: sha256:…" on its own line; capture it so the
          # signature binds to the exact pushed bytes, not the floating tag.
          # scripts/retry.sh absorbs transient GHCR push errors; its stdout (the
          # successful attempt's output) is logged and parsed for the digest.
          scripts/retry.sh helm push "${pkg}" "${repo}" >"${RUNNER_TEMP}/push.log" 2>&1
          cat "${RUNNER_TEMP}/push.log"
          digest="$(awk '/^Digest: /{print $2}' "${RUNNER_TEMP}/push.log")"
          if [[ -z "${digest}" ]]; then
            echo "could not parse pushed chart digest from helm push output" >&2
            exit 1
          fi
          ref="${REGISTRY}/${OWNER}/charts/actions-gateway@${digest}"
          # Keyless: same ambient OIDC → Fulcio → Rekor path as the image signing.
          scripts/retry.sh cosign sign --yes "${ref}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
      - name: Package, push, and sign the v2 CRD chart (keyless)
        id: chart_crds_v2
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          # The opt-in actions-gateway-crds-v2 chart (v2alpha1 CRDs), published
          # separately so the large pod-template CRDs do not bloat the main chart's
          # Helm release (Q149). Same versioning/sign path as the main chart.
          version="${TAG#v}"
          repo="oci://${REGISTRY}/${OWNER}/charts"
          helm package charts/actions-gateway-crds-v2 \
            --version "${version}" --app-version "${version}" \
            --destination "${RUNNER_TEMP}"
          pkg="${RUNNER_TEMP}/actions-gateway-crds-v2-${version}.tgz"
          scripts/retry.sh helm push "${pkg}" "${repo}" >"${RUNNER_TEMP}/push-crds-v2.log" 2>&1
          cat "${RUNNER_TEMP}/push-crds-v2.log"
          digest="$(awk '/^Digest: /{print $2}' "${RUNNER_TEMP}/push-crds-v2.log")"
          if [[ -z "${digest}" ]]; then
            echo "could not parse pushed v2 CRD chart digest from helm push output" >&2
            exit 1
          fi
          ref="${REGISTRY}/${OWNER}/charts/actions-gateway-crds-v2@${digest}"
          scripts/retry.sh cosign sign --yes "${ref}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
      - name: Record published chart in the run summary
        env:
          REF: ${{ steps.chart.outputs.ref }}
          REF_CRDS_V2: ${{ steps.chart_crds_v2.outputs.ref }}
          TAG: ${{ steps.tag.outputs.tag }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          {
            printf -- '- **chart** — `%s`\n' "${REF}"
            printf -- '  install: `helm install actions-gateway oci://%s/%s/charts/actions-gateway --version %s`\n' \
              "${REGISTRY}" "${OWNER}" "${TAG#v}"
            printf -- '- **chart (v2 CRDs, opt-in)** — `%s`\n' "${REF_CRDS_V2}"
            printf -- '  install: `helm install actions-gateway-crds-v2 oci://%s/%s/charts/actions-gateway-crds-v2 --version %s`\n' \
              "${REGISTRY}" "${OWNER}" "${TAG#v}"
          } >> "${GITHUB_STEP_SUMMARY}"
