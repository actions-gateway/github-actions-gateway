version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/api"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/broker"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/githubapp"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/cmd/agc"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/cmd/gmc"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/cmd/proxy"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/cmd/worker"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/cmd/probe"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "gomod"
    directory: "/test/fakegithub"
    schedule:
      interval: "weekly"
    groups:
      go-deps:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]

  # Track base-image (FROM) updates for every Dockerfile so the digest pins —
  # golang builder, distroless runtime, and the upstream actions-runner that the
  # worker image inherits its CVEs from — get automated bump PRs. The worker
  # trivy leg is report-only precisely because these are upstream; this is the
  # channel that keeps them current (see Q70 in docs/STATUS.md).
  - package-ecosystem: "docker"
    directories:
      - "/cmd/gmc"
      - "/cmd/agc"
      - "/cmd/proxy"
      - "/cmd/worker"
      - "/test/fakegithub"
    schedule:
      interval: "weekly"
    groups:
      docker-base:
        patterns: ["*"]
