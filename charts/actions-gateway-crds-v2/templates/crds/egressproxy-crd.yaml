---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
    # Sourced from the controller-gen output under cmd/*/config/crd (do not
    # hand-edit). Shipped under templates/crds/ with resource-policy: keep so
    # day-2 `helm upgrade` carries CRD field changes and `helm uninstall`
    # preserves every tenant's v2 (actions-gateway.com) objects.
    helm.sh/resource-policy: keep
  name: egressproxies.actions-gateway.com
spec:
  group: actions-gateway.com
  names:
    categories:
    - actions-gateway
    kind: EgressProxy
    listKind: EgressProxyList
    plural: egressproxies
    shortNames:
    - ep
    singular: egressproxy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.minReplicas
      name: Min
      type: integer
    - jsonPath: .spec.maxReplicas
      name: Max
      type: integer
    - jsonPath: .status.readyReplicas
      name: ReadyReplicas
      type: integer
    - jsonPath: .status.conditions[?(@.type=='Ready')].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=='Ready')].reason
      name: Reason
      priority: 1
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v2alpha1
    schema:
      openAPIV3Schema:
        description: |-
          EgressProxy is a namespace-scoped CRD reconciled by the GMC into a shared egress
          proxy pool. It is referenced by RunnerSets (proxyRef) and ActionsGateways
          (defaultProxyRef) by name; referrers never own it (§H.8).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              EgressProxySpec is the desired state of a standalone, optionally shared egress
              proxy pool — v1alpha1's inline ActionsGateway.spec.proxy promoted to its own kind
              so any number of RunnerSets can point at one pool (§H.4, §H.5). Reconciled by the
              GMC, which owns the proxy Deployment/Service/HPA/PDB (the reconciler lands in M2).
            properties:
              egressPolicyMode:
                default: CIDR
                description: |-
                  EgressPolicyMode selects how the GMC expresses the proxy pool's GitHub egress
                  allowlist: the default CIDR mode (standard NetworkPolicy + 24h IP-range
                  reconcile, works on every CNI) or a CNI-native DNS-aware FQDN mode
                  (CiliumFQDN / CalicoFQDN) that requires a DNS-aware policy CNI. It has no
                  effect when managedNetworkPolicy is false. See the EgressPolicyMode docs for
                  the secure-by-default (fail-closed) guarantee.
                enum:
                - CIDR
                - CiliumFQDN
                - CalicoFQDN
                type: string
              managedNetworkPolicy:
                default: true
                description: |-
                  ManagedNetworkPolicy controls whether the GMC manages this proxy's egress
                  NetworkPolicy. Defaults to true (secure default).
                type: boolean
              maxReplicas:
                default: 10
                description: MaxReplicas is the ceiling of the proxy pool's HPA.
                format: int32
                maximum: 100
                minimum: 1
                type: integer
              minReplicas:
                default: 2
                description: MinReplicas is the floor of the proxy pool's HPA.
                format: int32
                minimum: 1
                type: integer
              noProxyCIDRs:
                description: |-
                  NoProxyCIDRs lists destinations excluded from the per-tenant egress proxy
                  (appended to NO_PROXY). Entries may be CIDR prefixes, bare IPs, or NO_PROXY
                  domain suffixes for internal destinations. Never list GitHub here — an entry
                  that routes GitHub traffic around the proxy defeats per-tenant egress-IP
                  attribution and is rejected by the GMC admission path.
                items:
                  type: string
                type: array
              resources:
                description: Resources are the proxy container's resource requirements.
                properties:
                  claims:
                    description: |-
                      Claims lists the names of resources, defined in spec.resourceClaims,
                      that are used by this container.

                      This field depends on the
                      DynamicResourceAllocation feature gate.

                      This field is immutable. It can only be set for containers.
                    items:
                      description: ResourceClaim references one entry in PodSpec.ResourceClaims.
                      properties:
                        name:
                          description: |-
                            Name must match the name of one entry in pod.spec.resourceClaims of
                            the Pod where this field is used. It makes that resource available
                            inside a container.
                          type: string
                        request:
                          description: |-
                            Request is the name chosen for a request in the referenced claim.
                            If empty, everything from the claim is made available, otherwise
                            only the result of this request.
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                    x-kubernetes-list-map-keys:
                    - name
                    x-kubernetes-list-type: map
                  limits:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Limits describes the maximum amount of compute resources allowed.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                  requests:
                    additionalProperties:
                      anyOf:
                      - type: integer
                      - type: string
                      pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                      x-kubernetes-int-or-string: true
                    description: |-
                      Requests describes the minimum amount of compute resources required.
                      If Requests is omitted for a container, it defaults to Limits if that is explicitly specified,
                      otherwise to an implementation-defined value. Requests cannot exceed Limits.
                      More info: https://kubernetes.io/docs/concepts/configuration/manage-resources-containers/
                    type: object
                type: object
              sharing:
                description: |-
                  Sharing controls cross-namespace reference to this proxy. nil means
                  same-namespace only (the default, secure). Consent lives on the provider
                  (proxy owner) side: a consumer-side name alone never authorizes the reference
                  (§H.9). v2 ships the inline allowlist only.
                properties:
                  allowedNamespaces:
                    description: |-
                      AllowedNamespaces lists namespaces permitted to reference this proxy. A
                      consumer-side name alone never authorizes a cross-namespace reference.
                    items:
                      type: string
                    type: array
                    x-kubernetes-list-type: set
                type: object
              targetCPUUtilizationPercentage:
                default: 60
                description: |-
                  TargetCPUUtilizationPercentage is the proxy HPA's target CPU utilization. This
                  is the managed-default knob; bring-your-own autoscaler is a deferred opt-out.
                format: int32
                type: integer
            type: object
            x-kubernetes-validations:
            - message: minReplicas must not exceed maxReplicas
              rule: '!has(self.minReplicas) || !has(self.maxReplicas) || self.minReplicas
                <= self.maxReplicas'
          status:
            description: |-
              EgressProxyStatus is the observed state of an EgressProxy, following the uniform
              v2 status/condition contract (§H.7). Nothing owns an EgressProxy and it owns its
              own children; deletion degrades referrers rather than blocking, so it carries no
              finalizer (§H.8).
            properties:
              conditions:
                description: 'Conditions are the observed conditions of the proxy
                  pool. Known types: Ready.'
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              observedGeneration:
                description: ObservedGeneration is the .metadata.generation the most
                  recent reconcile acted on.
                format: int64
                type: integer
              readyReplicas:
                description: ReadyReplicas is the number of ready proxy pods.
                format: int32
                type: integer
            type: object
        type: object
        x-kubernetes-validations:
        - message: 'metadata.name must be at most 52 characters: the GMC derives the
            <name>-proxy Service and reserves the remainder of the 63-char Service-name
            budget'
          rule: self.metadata.name.size() <= 52
    served: true
    storage: true
    subresources:
      status: {}
