- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get"]
# resourcequotas (read-only): the RunnerGroup reconciler reads the namespace
# ResourceQuota to compute the WorkerQuota{Pressure,Exceeded} conditions (Q82) —
# correlating the worker pool's footprint against the quota's hard/used. The
# quota is platform-owned (Q130); the AGC never creates or mutates it, so this
# grant is strictly get/list/watch.
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["get", "list", "watch"]
# events: the RunnerGroup reconciler emits Kubernetes Events on credential,
# agent-pool, listener, and deregistration failures plus Ready transitions
# and worker-pod reaps. Both groups are required: the AGC's new-style
# recorder (mgr.GetEventRecorder) writes events.k8s.io/v1 Events — with only
# the core ("") grant those writes are silently 403'd.
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
- apiGroups: ["events.k8s.io"]
  resources: ["events"]
  verbs: ["create", "patch"]
# list on secrets: the agent pool enumerates its own per-runner Secrets to
# reconcile pool state (metadata-only PartialObjectMetadataList — names/labels,
# never credential bodies). watch is deliberately omitted (no Secret informer).
# update: the single-use JIT agent recycle (Q114) rewrites an agent's Secret
# in place after re-registering it post-job.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "update", "delete"]
- apiGroups: ["actions-gateway.github.com"]
  resources: ["runnergroups"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["actions-gateway.github.com"]
  resources: ["runnergroups/status", "runnergroups/finalizers"]
  verbs: ["get", "update", "patch"]
# v2 (actions-gateway.com): the RunnerSet reconciler reconciles RunnerSets and
# reads their references (gatewayRef → ActionsGateway, proxyRef/defaultProxyRef →
# EgressProxy, templateRef → RunnerTemplate) at runtime to resolve the worker pod
# shape and egress proxy (§H.7). All four are namespaced, so the per-tenant
# RoleBinding to this ClusterRole scopes the grants to the tenant namespace.
# Cluster-scoped ClusterRunnerTemplate reads need a ClusterRoleBinding and are
# wired separately (M3b); the namespaced RunnerTemplate gives v1 parity here.
- apiGroups: ["actions-gateway.com"]
  resources: ["runnersets"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["actions-gateway.com"]
  resources: ["runnersets/status", "runnersets/finalizers"]
  verbs: ["get", "update", "patch"]
- apiGroups: ["actions-gateway.com"]
  resources: ["actionsgateways", "egressproxies", "runnertemplates"]
  verbs: ["get", "list", "watch"]
