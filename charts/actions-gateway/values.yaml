# Default values for the actions-gateway chart.
#
# This chart installs the Gateway Manager Controller (GMC) only. Per-tenant
# Actions Gateway Controller (AGC) instances and egress proxy pools are
# provisioned by the GMC at runtime from each ActionsGateway CR — they are not
# chart resources. The agc.image / proxy.image values below are the references
# the GMC *injects* into the gateways it creates, not images this chart runs.
#
# SECURE BY DEFAULT: every default here matches the hardened posture of the
# cmd/gmc/config/ kustomize bases. Do not flip a security default to a
# convenience default — the less-secure form is always an explicit opt-out.

# namePrefix is prepended to every GMC resource name (default "gmc", which
# reproduces the kustomize bases). Changing it also changes the ServiceAccount
# identity that the namespace-psa-guard policy matches — keep it "gmc" unless
# you understand that coupling.
namePrefix: gmc

# Number of GMC controller-manager replicas. Two by default for HA: leader
# election (leaderElection.enabled) makes the standby take over if the active
# manager's node drains. Paired with the PodDisruptionBudget below.
replicaCount: 2

# imagePullSecrets are attached to the GMC controller-manager pod so it can pull
# the GMC image from a private/mirrored registry that requires authentication —
# the air-gapped / egress-restricted path (see
# docs/operations/air-gapped-install.md). Each entry references a
# `kubernetes.io/dockerconfigjson` Secret that already exists in the install
# namespace; create it from a file (never commit registry creds to this
# values.yaml). Empty (default) pulls anonymously, as from public GHCR.
# The AGC, proxy, and worker images are pulled by pods the GMC/AGC provision at
# runtime, NOT by this chart — attach their pull Secret to the relevant tenant
# ServiceAccount instead (see the air-gapped guide).
# e.g. imagePullSecrets: [{name: private-registry}]
imagePullSecrets: []

# -- GMC controller-manager image (the operator this chart runs). --
# To relocate to a private mirror, override `repository` per image (here and for
# agc/proxy below) and keep the matching `digest` — relocation is
# content-addressed, so the digest is unchanged. See
# docs/operations/air-gapped-install.md.
gmc:
  image:
    repository: ghcr.io/actions-gateway/gmc
    # tag is used only when digest is empty AND allowFloatingImageTags=true.
    # appVersion in Chart.yaml is the release this tag should track.
    tag: ""
    # digest (e.g. "sha256:abc123…") pins the image immutably. REQUIRED:
    # rendering fails when this is empty, so the GMC's own image can never
    # silently fall back to a mutable :latest tag (secure by default). The
    # only escape hatch is the explicit allowFloatingImageTags=true dev/test
    # opt-out below, which falls back to tag (default "latest").
    digest: ""
  imagePullPolicy: IfNotPresent

# -- Images the GMC injects into the gateways it provisions. --
# These are NOT run by this chart. The GMC REQUIRES both to be pinned by
# sha256 digest and rejects floating tags at startup (validateImageDigest in
# cmd/gmc/cmd/main.go) unless allowFloatingImageTags=true below. That is the
# secure default: an unconfigured install fails closed at GMC startup until you
# pin a digest here, rather than silently running a mutable tag inside tenant
# gateways. Set agc.image.digest and proxy.image.digest before installing.
agc:
  image:
    repository: ghcr.io/actions-gateway/agc
    tag: ""
    digest: ""
proxy:
  image:
    repository: ghcr.io/actions-gateway/proxy
    tag: ""
    digest: ""
# wrapper is the worker-wrapper image (Q235): a ~2 MB scratch image holding just
# the cmd/worker wrapper binary. The GMC forwards it to every AGC, which injects
# it into each worker pod so the runner container can be the unmodified upstream
# actions-runner (or any tenant workerImage) instead of a baked-in wrapper image.
# Digest-pinned like agc/proxy; floating tags need allowFloatingImageTags.
wrapper:
  image:
    repository: ghcr.io/actions-gateway/wrapper
    tag: ""
    digest: ""

# allowFloatingImageTags=true passes --allow-floating-image-tags to the GMC
# (disabling the AGC_IMAGE/PROXY_IMAGE digest-pinning requirement) AND lets
# the chart render the GMC's own image from a floating tag when
# gmc.image.digest is empty (otherwise rendering fails). DEV/TEST ONLY — do
# not enable in production. Leaving it false keeps the secure default.
allowFloatingImageTags: false

# allowedPriorityClasses is the platform allowlist of cluster-scoped PriorityClass
# names that tenant RunnerGroups may reference in priorityTiers. It is passed to
# the GMC as --allowed-priority-classes. The platform admin pre-creates these
# PriorityClass objects (create them with preemptionPolicy: Never unless a tier is
# genuinely meant to preempt cross-tenant — PriorityClasses are global) and lists
# their names here; the admission webhook rejects any other name so a tenant cannot
# name a high-priority class and evict other tenants' worker pods. Empty (default)
# forbids all priorityTiers PriorityClass references — the secure default. See
# docs/operations/security-operations.md § Priority classes.
# e.g. allowedPriorityClasses: ["runner-standard", "runner-opportunistic"]
allowedPriorityClasses: []

# priorityClassAllowlist optionally lets the GMC ALSO source the PriorityClass
# allowlist from a watched ConfigMap, so a platform admin can add an allowed class
# without editing allowedPriorityClasses and rolling out the GMC (Q188). It is
# additive to (never a replacement for) the static flag above, and fail-safe: a
# missing or malformed ConfigMap leaves the static flag allowlist in force.
priorityClassAllowlist:
  # configMapName names a ConfigMap in the GMC's own namespace whose
  # `data.allowedPriorityClasses` value (comma/newline-separated names) augments
  # the static allowlist, passed to the GMC as --priority-class-allowlist-configmap.
  # Setting it also renders a namespaced Role/RoleBinding granting the GMC
  # get/list/watch on that one ConfigMap (no cluster-wide ConfigMap read). Empty
  # (default) disables the watch — flag-only behavior, unchanged. See
  # docs/operations/security-operations.md § Priority classes.
  configMapName: ""

# allowedEgressFQDNs / allowedEgressCIDRs are the platform allowlist of non-GitHub
# destinations a tenant EgressProxy may request via spec.destinationFQDNs /
# spec.destinationCIDRs (Q242 G.1). They are passed to the GMC as
# --allowed-egress-fqdns / --allowed-egress-cidrs; the EgressProxy admission webhook
# rejects any destination not covered (FQDN suffix match / CIDR subnet containment).
# GitHub is always allowed implicitly. Both empty (default) forbid every non-GitHub
# destination — the secure default. Prefer an in-cluster caching mirror for remote
# third-party dependencies and reserve the allowlist for what a mirror cannot proxy;
# see docs/operations/security-operations.md § Worker egress destinations.
# e.g. allowedEgressFQDNs: ["proxy.golang.org", "sum.golang.org"]
allowedEgressFQDNs: []
allowedEgressCIDRs: []

# egressDestinationAllowlist optionally lets the GMC ALSO source the egress
# destination allowlist from a watched ConfigMap, so a platform admin can add a
# permitted destination without editing the flags above and rolling out the GMC
# (Q242 G.1). Additive to (never a replacement for) the static flags, and fail-safe:
# a missing or malformed ConfigMap leaves the static flag allowlists in force.
egressDestinationAllowlist:
  # configMapName names a ConfigMap in the GMC's own namespace whose `data.fqdns`
  # and `data.cidrs` values (comma/newline-separated) augment the static allowlists,
  # passed to the GMC as --egress-destination-allowlist-configmap. Setting it also
  # renders a namespaced Role/RoleBinding granting the GMC get/list/watch on that one
  # ConfigMap. Empty (default) disables the watch — flag-only behavior. See
  # docs/operations/security-operations.md § Worker egress destinations.
  configMapName: ""

# apiServerCIDRs optionally scopes the AGC NetworkPolicy's Kubernetes API server
# (443/6443) egress rule to a known apiserver CIDR set, passed to the GMC as
# --apiserver-cidrs. By default this rule allows egress to ANY destination on
# 443/6443: kube-proxy DNATs the kubernetes Service ClusterIP to a
# provider-specific apiserver IP *before* NetworkPolicy is evaluated, so a
# precise ipBlock is not portable and a wrong one silently severs the AGC's
# apiserver access (the PR #59 post-DNAT trap). Leaving this EMPTY (default)
# preserves that any-destination behavior — required where the post-DNAT
# apiserver IP is unpredictable. On a platform whose apiserver endpoint exposes a
# STABLE CIDR, set it here to tighten the rule to those CIDRs (ipBlock) — an
# opt-in tightening that narrows the GitHub-App-key exfil surface (Q145,
# docs/design/05-security.md §5.2). Each entry must be a valid CIDR; the GMC
# fails startup on a malformed one. See docs/operations/security-operations.md.
# e.g. apiServerCIDRs: ["10.0.0.1/32", "172.16.0.0/12"]
apiServerCIDRs: []

# leaderElection gates the --leader-elect flag. Keep enabled when replicaCount
# > 1, or two active managers will fight over reconciliation.
leaderElection:
  enabled: true

# metrics controls the controller-runtime metrics endpoint (HTTPS :8443,
# TokenReview/SubjectAccessReview-gated).
metrics:
  enabled: true
  # tls controls how the GMC metrics server's serving certificate is issued and
  # whether the ServiceMonitor verifies it when scraping.
  tls:
    certManager:
      # enabled: true (default) — cert-manager issues a dedicated metrics
      #   serving cert (the `metrics-serving-cert` Certificate from the same
      #   selfsigned-issuer as the webhook), the GMC serves it via
      #   --metrics-cert-path, and the ServiceMonitor verifies it against the
      #   issuing CA (tlsConfig.ca + serverName). This is the secure default:
      #   the scrape is no longer MITM-able. REQUIRES certManager.enabled=true
      #   (the metrics path reuses the webhook's cert-manager Issuer); it is
      #   automatically inert when certManager.enabled=false.
      # enabled: false (or certManager.enabled=false) — the GMC falls back to
      #   controller-runtime's auto-generated self-signed metrics cert and the
      #   ServiceMonitor scrapes with insecureSkipVerify:true. Prometheus cannot
      #   verify the server, so the scrape is MITM-able. Use only on clusters
      #   without cert-manager, accepting the weaker posture. See
      #   docs/operations/observability.md.
      enabled: true
  # serviceMonitor emits Prometheus-Operator ServiceMonitors. Opt-in (off by
  # default): the ServiceMonitor CRD only exists once the Prometheus Operator
  # is installed, so enabling it without that CRD breaks `helm install`. Label
  # your Prometheus namespace `metrics: enabled` so the NetworkPolicy admits
  # the scraper. See docs/operations/observability.md.
  #
  # Enabling this turns on BOTH the GMC manager ServiceMonitor (this release's
  # namespace) AND a per-tenant ServiceMonitor for every provisioned tenant's
  # proxy/AGC mTLS metrics ports (:8443) — the GMC creates the latter in each
  # tenant namespace, presenting that tenant's scraper client bundle for mTLS
  # (it passes --enable-tenant-service-monitors to the manager). The per-tenant
  # metrics Services (:8443) are always created regardless of this switch; only
  # the scrape wiring is gated.
  serviceMonitor:
    enabled: false

# networkPolicy ships the two GMC ingress policies (default-deny + metrics
# allowlist + webhook allow). ON by default (secure-by-default): selecting the
# manager pod flips it to default-deny ingress. Requires a CNI that enforces
# NetworkPolicy (Calico/Cilium; kindnet does not). Disable only on a cluster
# whose CNI cannot enforce policy, accepting the weaker posture.
networkPolicy:
  enabled: true

# podDisruptionBudget keeps minAvailable: 1 so a voluntary disruption never
# evicts both GMC replicas at once. Disable only for single-replica installs.
podDisruptionBudget:
  enabled: true

# certManager controls how the validating webhook's serving cert is issued.
#   enabled: true  (default) — cert-manager issues it via a self-signed Issuer
#     + Certificate; the webhook caBundle is injected by cert-manager's
#     ca-injector. Requires cert-manager installed in the cluster.
#   enabled: false — the chart generates a self-signed serving cert at render
#     time and writes both the webhook-server-cert Secret and the webhook
#     caBundle directly, so the webhook installs with NO cert-manager present.
#     Trade-off: the cert rotates on a `helm upgrade` that does not reuse the
#     existing Secret — see docs/operations/upgrade.md.
certManager:
  enabled: true
  # Validity (days) of the self-signed cert when certManager.enabled=false.
  selfSignedCertDurationDays: 3650

# admissionPolicy ships two ValidatingAdmissionPolicies that confine the GMC's
# cluster-wide write grants to marked tenant namespaces: namespace-psa-guard
# (the namespace PSA-label patch) and tenant-resource-guard (create/update/delete
# of Deployments, Secrets, RoleBindings, NetworkPolicies, etc.). ON by default
# (secure-by-default). Requires Kubernetes >= 1.30 (GA ValidatingAdmissionPolicy).
admissionPolicy:
  enabled: true

# resources for the GMC controller-manager container. Defaults match the
# kustbase; tune for large clusters.
resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

# priorityClassName schedules the GMC ahead of ordinary workloads and protects
# it from preemption — it is cluster-critical control plane. Empty string
# disables (e.g. on clusters without the built-in system-cluster-critical class).
priorityClassName: system-cluster-critical

# systemCriticalPriorityQuota ships a ResourceQuota in the install namespace that
# PERMITS the GMC's system-*-critical priorityClassName (above) under the
# restricted PriorityClass admission config that GKE — and any cluster wired the
# same way — enables. There, a pod may reference system-node-critical /
# system-cluster-critical only in a namespace that carries a ResourceQuota whose
# scopeSelector matches that class; without it the GMC ReplicaSet fails pod
# creation with "insufficient quota to match these scopes:
# [{PriorityClass In [...]}]" and the Deployment never becomes Ready. This was hit
# on a live GKE install.
#
# ON by default so a stock `helm install` succeeds on GKE out of the box WITHOUT
# downgrading the secure, eviction-protected system-cluster-critical default. The
# quota only PERMITS the classes — its pod ceiling is deliberately generous and it
# is scoped to the system-critical classes, so it counts nothing but the GMC's own
# pods and never constrains scheduling. It is harmless on clusters without that
# admission config (they already permit the classes), and is rendered only while
# priorityClassName is a system-*-critical class (so disabling the priority class
# drops the now-pointless quota too). Set enabled: false to omit it, e.g. if you
# manage this quota out-of-band. See docs/operations/install.md.
systemCriticalPriorityQuota:
  enabled: true
  # Pod ceiling for the scoped quota. Must exceed the GMC replica count; the
  # default is generous so the quota only ever satisfies the admission
  # requirement, never caps scheduling.
  maxPods: 100

# nodeSelector / tolerations / affinity for the GMC pod (optional).
nodeSelector: {}
tolerations: []
affinity: {}

# topologySpreadConstraints spreads the GMC replicas across nodes so a single
# node failure cannot take out both — replicaCount: 2 and the PodDisruptionBudget
# only deliver HA if the two pods are not co-located. The default is a soft
# (whenUnsatisfiable: ScheduleAnyway) hostname spread: it expresses the
# preference without blocking scheduling on single-node clusters (e.g. kind).
# Set enabled: false to drop it, or raise the spread to zones via topologyKey:
# topology.kubernetes.io/zone on multi-zone clusters.
topologySpreadConstraints:
  enabled: true
  maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: ScheduleAnyway

# sampleGateway renders an example ActionsGateway CR in the release namespace.
# OFF by default — a real tenant needs its own namespace, a GitHub App Secret,
# and a reviewed quota (see docs/operations/tenant-onboarding.md). Intended for
# kicking the tyres on a dev cluster only.
sampleGateway:
  create: false
  # securityProfile for the sample CR. baseline blocks privileged containers,
  # host namespaces, hostPath, and dangerous caps. Tighten to "restricted" or
  # (only with justification) "privileged".
  securityProfile: baseline
  gitHubAppSecretName: github-app-v1
  # gitHubURL is the GitHub organization, enterprise, or repository URL the
  # sample gateway's runners register against. Required — point it at your own
  # org (e.g. https://github.com/my-org) or a single repo
  # (https://github.com/my-org/my-repo) before enabling the sample.
  gitHubURL: https://github.com/my-org
