{{- $sa := include "actions-gateway.serviceAccountName" . -}}
{{- $prefix := include "actions-gateway.namePrefix" . -}}
# ClusterRole — the GMC's reconcile permissions. Cluster-scoped because the GMC
# provisions resources across every tenant namespace. The rules below are
# single-sourced from the controller-gen output of the GMC controllers'
# +kubebuilder:rbac markers (cmd/gmc/config/rbac/role.yaml): the
# files/manager-role-rules.yaml fragment is generated by `make chart-rbac` and
# gated against drift by `make chart-rbac-check` (Q142). Do not hand-edit the
# rules — change the markers and regenerate.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $prefix }}-manager-role
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
rules:
  {{- .Files.Get "files/manager-role-rules.yaml" | nindent 0 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $prefix }}-manager-rolebinding
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $prefix }}-manager-role
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
{{- if .Values.priorityClassAllowlist.configMapName }}
---
# priority-class-allowlist (Q188) — namespaced read of the single watched
# ConfigMap that augments the static --allowed-priority-classes flag. Scoped to
# the GMC's own namespace and to get/list/watch only, so enabling the watch never
# grants cluster-wide ConfigMap read. Rendered only when the watch is configured.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $prefix }}-priority-class-allowlist-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $prefix }}-priority-class-allowlist-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $prefix }}-priority-class-allowlist-role
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.egressDestinationAllowlist.configMapName }}
---
# egress-destination-allowlist (Q242 G.1) — namespaced read of the single watched
# ConfigMap that augments the static --allowed-egress-fqdns/--allowed-egress-cidrs
# flags. Scoped to the GMC's own namespace and to get/list/watch only, so enabling
# the watch never grants cluster-wide ConfigMap read. Rendered only when configured.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $prefix }}-egress-destination-allowlist-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $prefix }}-egress-destination-allowlist-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $prefix }}-egress-destination-allowlist-role
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.metrics.enabled }}
---
# metrics-auth — lets the manager run TokenReview/SubjectAccessReview to
# authenticate and authorize /metrics scrapers.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $prefix }}-metrics-auth-role
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
rules:
- apiGroups:
  - authentication.k8s.io
  resources:
  - tokenreviews
  verbs:
  - create
- apiGroups:
  - authorization.k8s.io
  resources:
  - subjectaccessreviews
  verbs:
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $prefix }}-metrics-auth-rolebinding
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $prefix }}-metrics-auth-role
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
---
# metrics-reader — a role operators can bind to a scraper identity to grant
# read of the /metrics endpoint.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ $prefix }}-metrics-reader
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
rules:
- nonResourceURLs:
  - "/metrics"
  verbs:
  - get
{{- end }}
{{- if .Values.leaderElection.enabled }}
---
# leader-election — namespaced lease/configmap permissions for HA failover.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ $prefix }}-leader-election-role
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $prefix }}-leader-election-rolebinding
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ $prefix }}-leader-election-role
subjects:
- kind: ServiceAccount
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
{{- end }}
