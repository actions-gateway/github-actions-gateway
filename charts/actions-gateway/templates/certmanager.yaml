{{- if .Values.certManager.enabled }}
# cert-manager path (default). A self-signed Issuer mints the webhook serving
# cert into the webhook-server-cert Secret; the ca-injector copies its CA into
# the ValidatingWebhookConfiguration caBundle (see webhook.yaml annotation).
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: serving-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
spec:
  dnsNames:
  - {{ printf "webhook-service.%s.svc" .Release.Namespace }}
  - {{ printf "webhook-service.%s.svc.cluster.local" .Release.Namespace }}
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: webhook-server-cert
{{- if (include "actions-gateway.metricsCertManagerEnabled" .) }}
---
# Metrics serving cert (metrics.tls.certManager.enabled, default). Reuses the
# selfsigned-issuer above to mint a cert for the metrics Service into the
# metrics-server-cert Secret; the GMC serves it via --metrics-cert-path and the
# ServiceMonitor verifies it against the CA, so the scrape is not MITM-able.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: metrics-serving-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
spec:
  dnsNames:
  - {{ include "actions-gateway.metricsServiceDNSName" . }}
  - {{ printf "%s-metrics-service.%s.svc.cluster.local" (include "actions-gateway.managerName" .) .Release.Namespace }}
  issuerRef:
    kind: Issuer
    name: selfsigned-issuer
  secretName: metrics-server-cert
{{- end }}
{{- else }}
# Self-signed fallback (certManager.enabled=false). The chart generates the
# serving cert at render time and writes it straight into the Secret the
# manager mounts; the matching CA is set on the webhook caBundle in webhook.yaml.
{{- include "actions-gateway.webhookCerts" . }}
apiVersion: v1
kind: Secret
metadata:
  name: webhook-server-cert
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ b64enc $.agWebhookCerts.tlsCert }}
  tls.key: {{ b64enc $.agWebhookCerts.tlsKey }}
  ca.crt: {{ b64enc $.agWebhookCerts.caCert }}
{{- end }}
