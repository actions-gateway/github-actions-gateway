{{- /*
The agc-tenant-role rules are single-sourced in files/agc-tenant-role-rules.yaml
(Q143). This template embeds them via .Files.Get, and the GMC integration suite
(installAGCTenantClusterRole in suite_integration_test.go) reads the SAME file —
so the shipped permission set and the RBAC-scope test can never drift. Edit the
fragment, not this block. This is NOT generated from the AGC +kubebuilder:rbac
markers (cmd/agc/config/rbac/role.yaml): the tenant role deliberately withholds
runnergroup create/delete and secret patch that the markers grant (least
privilege), so the fragment is the authoritative hand-maintained source.
*/ -}}
# agc-tenant-role — the permission set granted to every AGC ServiceAccount.
# A singleton ClusterRole; per-tenant isolation comes from RoleBindings (one
# per ActionsGateway namespace) the GMC creates that reference it.
#
# The name is intentionally UNPREFIXED and must stay `agc-tenant-role`: the
# GMC manager-role grants `bind` only on this exact resourceName, and the GMC
# only has `bind` (not create/escalate) on it. Renaming it breaks provisioning.
# It is also a public API surface (the AGC permission contract), not an
# internal GMC resource.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agc-tenant-role
  labels:
    app.kubernetes.io/name: actions-gateway
    app.kubernetes.io/component: agc-tenant-role
    app.kubernetes.io/part-of: actions-gateway
    app.kubernetes.io/managed-by: {{ .Release.Service }}
rules:
  {{- .Files.Get "files/agc-tenant-role-rules.yaml" | trimSuffix "\n" | nindent 0 }}
