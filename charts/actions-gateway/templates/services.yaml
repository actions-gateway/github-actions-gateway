# webhook-service — fronts the validating webhook server (port 443 -> 9443).
# Its name is fixed as `webhook-service` to match the cert-manager Certificate
# dnsNames and the self-signed cert SANs (see certmanager.yaml).
apiVersion: v1
kind: Service
metadata:
  name: webhook-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
spec:
  ports:
    - port: 443
      protocol: TCP
      targetPort: 9443
  selector:
    {{- include "actions-gateway.selectorLabels" . | nindent 4 }}
{{- if .Values.metrics.enabled }}
---
# controller-manager metrics service (HTTPS :8443).
apiVersion: v1
kind: Service
metadata:
  name: {{ include "actions-gateway.managerName" . }}-metrics-service
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "actions-gateway.labels" . | nindent 4 }}
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    {{- include "actions-gateway.selectorLabels" . | nindent 4 }}
{{- end }}
