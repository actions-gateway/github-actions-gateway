apiVersion: apps/v1
kind: Deployment
metadata:
  name: athens
  namespace: gag-dogfood
  labels:
    app: athens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: athens
  template:
    metadata:
      labels:
        app: athens
    spec:
      # No toleration for dedicated=workers, so this lands on the system node pool
      # and stays up when spot workers are scaled to zero.
      containers:
        - name: athens
          # v0.18.0 bundles Go 1.26.2; older tags shipped EOL Go (v0.15.1 had
          # 1.20.14) that Athens uses to rebuild module zips on direct fetches.
          image: gomods/athens:v0.18.0
          ports:
            - containerPort: 3000
          env:
            - name: ATHENS_STORAGE_TYPE
              value: disk
            - name: ATHENS_DISK_STORAGE_ROOT
              value: /var/lib/athens
            - name: ATHENS_DOWNLOAD_MODE
              value: sync
            - name: ATHENS_LOG_LEVEL
              value: info
            # Fetch upstream modules through proxy.golang.org, not direct-from-VCS.
            # This overrides Athens' built-in default (GoBinaryEnvVars =
            # ["GOPROXY=direct"]), which forces its internal `go` subprocess to clone
            # each module from its origin and rebuild the zip locally. Athens' bundled
            # (older) Go computes a different module hash than the notarized one for
            # modules declaring a newer go directive (e.g. ginkgo/v2@v2.32.0, go 1.25),
            # so its own checksum check rejects the rebuild as a mismatch. The public
            # proxy instead serves the immutable, notarized zip whose hash matches
            # sum.golang.org and our committed go.sum — the check passes. The proxy is
            # also faster (pre-built zips over a CDN) and more available (one upstream
            # vs. every module's origin host). A plain container-level GOPROXY env var
            # does NOT work — Athens overrides it for the subprocess via this config.
            # The ",direct" fallback still resolves any module proxy.golang.org does
            # not mirror; Athens splits this var on ";", so the comma stays inside the
            # GOPROXY value (matching Go's own default GOPROXY).
            - name: ATHENS_GO_BINARY_ENV_VARS
              value: GOPROXY=https://proxy.golang.org,direct
            # Athens verifies fetched modules against sum.golang.org — it has free
            # egress (no workload NetworkPolicy on this pod). Empty GONOSUMCHECK means
            # "verify every module"; integrity is enforced end-to-end. Workers, which
            # have no egress to sum.golang.org, instead set GONOSUMDB=* and rely on the
            # committed go.sum.
            - name: ATHENS_GONOSUMCHECK
              value: ""
          volumeMounts:
            - name: storage
              mountPath: /var/lib/athens
          resources:
            requests:
              # Kept small so Athens reliably co-schedules with the AGC on the single
              # system node, whose CPU-request budget is tight during CI worker bursts.
              # Athens is I/O-bound (serving cached zips from the PVC); the generous
              # limits still allow bursting for cold-cache `go mod download` fetches.
              cpu: "100m"
              memory: "192Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: athens-storage
