apiVersion: apps/v1
kind: Deployment
metadata:
  name: athens
  namespace: gag-dogfood
  labels:
    app: athens
spec:
  replicas: 1
  selector:
    matchLabels:
      app: athens
  template:
    metadata:
      labels:
        app: athens
    spec:
      # No toleration for dedicated=workers, so this lands on the system node pool
      # and stays up when spot workers are scaled to zero.
      containers:
        - name: athens
          image: gomods/athens:v0.15.1
          ports:
            - containerPort: 3000
          env:
            - name: ATHENS_STORAGE_TYPE
              value: disk
            - name: ATHENS_DISK_STORAGE_ROOT
              value: /var/lib/athens
            - name: ATHENS_DOWNLOAD_MODE
              value: sync
            - name: ATHENS_LOG_LEVEL
              value: info
            # Workers verify downloaded modules against the committed go.sum; setting
            # GONOSUMDB=* on the workers skips the remote checksum database. Athens
            # should not do its own checksum verification (it would reject modules whose
            # sum.golang.org entry doesn't match proxy.golang.org's current bytes, causing
            # false 404s for valid modules in go.sum). Integrity is enforced by go.sum.
            # Athens-level config vars and the equivalent Go env vars (passed to the
            # go subprocess Athens spawns when fetching modules from upstream).
            - name: ATHENS_GONOSUMDB
              value: "*"
            - name: ATHENS_GONOSUMCHECK
              value: "*"
            - name: GONOSUMDB
              value: "*"
            - name: GONOSUMCHECK
              value: "*"
          volumeMounts:
            - name: storage
              mountPath: /var/lib/athens
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: athens-storage
