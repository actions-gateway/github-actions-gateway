---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-actions-gateway-github-com-v1alpha1-actionsgateway
  failurePolicy: Fail
  name: vactionsgateway-v1alpha1.kb.io
  rules:
  - apiGroups:
    - actions-gateway.github.com
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - actionsgateways
  sideEffects: None
