# This rule is not used by the project gmc itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the actions-gateway.github.com.actions-gateway.github.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gmc
    app.kubernetes.io/managed-by: kustomize
  name: actionsgateway-editor-role
rules:
- apiGroups:
  - actions-gateway.github.com.actions-gateway.github.com
  resources:
  - actionsgateways
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - actions-gateway.github.com.actions-gateway.github.com
  resources:
  - actionsgateways/status
  verbs:
  - get
