---
# agc-tenant-role is the permission set granted to every AGC ServiceAccount.
# It is a singleton ClusterRole shipped with the GMC install. Per-tenant
# isolation comes from RoleBindings (one per ActionsGateway namespace) that
# reference this ClusterRole — a RoleBinding to a ClusterRole only grants
# permissions inside the RoleBinding's namespace.
#
# Shipping this as a static ClusterRole — instead of having the GMC create a
# per-tenant Role at reconcile time — lets the GMC ServiceAccount stay narrow:
# it no longer needs `rbac.authorization.k8s.io/roles: create` nor the
# `escalate` verb. It only needs `bind` on this specific ClusterRole name.
#
# This file lives outside `config/default`'s kustomization tree on purpose:
# kustomize's `namePrefix: gmc-` (under config/default) would rename the
# ClusterRole to `gmc-agc-tenant-role`, but kustomize does NOT rewrite
# `rules[].resourceNames`, so the GMC's `bind` permission would no longer
# match the ClusterRole. The unprefixed name is also the right contract:
# this is a public API surface (the AGC permission contract), not an
# internal GMC resource. The Makefile `deploy` target applies it explicitly.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agc-tenant-role
  labels:
    app.kubernetes.io/name: actions-gateway
    app.kubernetes.io/component: agc-tenant-role
    app.kubernetes.io/managed-by: kustomize
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get"]
# events: the RunnerGroup reconciler emits Kubernetes Events (via an
# EventRecorder) on credential, agent-pool, listener, and deregistration
# failures, plus Ready-condition transitions, so operators see them in
# `kubectl describe runnergroup`. create+patch is the standard event-client
# permission set (patch supports event series aggregation).
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
# list on secrets is required: the agent pool enumerates its own per-runner
# Secrets to reconcile pool state. RBAC does not support glob resourceNames and
# the agent Secret names are dynamic, so we cannot constrain by name. To limit
# what that list exposes, the pool enumerates with a metadata-only
# PartialObjectMetadataList (k8s-best-practices §B B4 / Q57) — bulk lists return
# names and labels only, never the agent credential bodies. Bodies are read
# per-name via `get`. The "don't hold Secret bodies in process memory" property
# from W3 is preserved at the AGC's manager level by
# Client.Cache.DisableFor[*corev1.Secret] — both the metadata list and the
# per-name gets go direct to the API server rather than being held in the
# controller-runtime cache. `watch` is over-declared and unused (no Secret
# informer is registered); its removal is tracked as Q26.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["actions-gateway.github.com"]
  resources: ["runnergroups"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["actions-gateway.github.com"]
  resources: ["runnergroups/status", "runnergroups/finalizers"]
  verbs: ["get", "update", "patch"]
