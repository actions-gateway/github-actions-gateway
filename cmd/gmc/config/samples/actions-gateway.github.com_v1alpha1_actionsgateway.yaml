apiVersion: actions-gateway.github.com/v1alpha1
kind: ActionsGateway
metadata:
  labels:
    app.kubernetes.io/name: gmc
    app.kubernetes.io/managed-by: kustomize
  name: actionsgateway-sample
spec:
  # Secret (in this CR's namespace) holding the tenant's GitHub App credentials.
  gitHubAppRef:
    name: github-app
  # GitHub org/enterprise/repo URL the runners register against (required).
  gitHubURL: https://github.com/example-org
