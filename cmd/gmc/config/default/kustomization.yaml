# Adds namespace to all resources.
namespace: gmc-system

# Value of this field is prepended to the
# names of all resources, e.g. a deployment named
# "wordpress" becomes "alices-wordpress".
# Note that it should also match with the prefix (text before '-') of the namespace
# field above.
namePrefix: gmc-

# Labels to add to all resources and selectors.
#labels:
#- includeSelectors: true
#  pairs:
#    someName: someValue

resources:
- ../crd
- ../rbac
- ../manager
# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix including the one in
# crd/kustomization.yaml
- ../webhook
# [CERTMANAGER] To enable cert-manager, uncomment all sections with 'CERTMANAGER'. 'WEBHOOK' components are required.
- ../certmanager
# [PROMETHEUS] ServiceMonitor for Prometheus scraping. Opt-in (not default): the
# ServiceMonitor CRD only exists once the Prometheus Operator is installed, so
# enabling this unconditionally would break `kubectl apply` on clusters without
# it. Uncomment all 'PROMETHEUS' sections to enable. See docs/operations/observability.md.
#- ../prometheus
# [METRICS] Expose the controller manager metrics service.
- metrics_service.yaml
# [NETWORK POLICY] Protect the manager's /metrics endpoint with NetworkPolicy.
# Enabled by default (secure-by-default): selecting the manager pod flips it to
# default-deny ingress; /metrics (:8443) then admits only namespaces labeled
# 'metrics: enabled' (scrapers), while the validating-webhook port (9443) is
# re-allowed from any source because the kube-apiserver that calls it is not a
# labeled-namespace pod (see network-policy/allow-webhook-traffic.yaml). Label
# your Prometheus namespace 'metrics: enabled' or scraping breaks — see
# docs/operations/observability.md. Requires a CNI that enforces NetworkPolicy.
- ../network-policy

# Uncomment the patches line if you enable Metrics
patches:
# [METRICS] The following patch will enable the metrics endpoint using HTTPS and the port :8443.
# More info: https://book.kubebuilder.io/reference/metrics
- path: manager_metrics_patch.yaml
  target:
    kind: Deployment

# Uncomment the patches line if you enable Metrics and CertManager
# [METRICS-WITH-CERTS] Opt-in (not default): swap controller-runtime's self-signed
# metrics cert for a cert-manager-issued one so scrapers can verify it instead of
# using insecure_skip_verify. The /metrics endpoint is already TLS + RBAC-authn
# gated (metrics_auth_role), so this is defense-in-depth, not a required control;
# it is kept opt-in because it hard-requires cert-manager at install time.
# Uncomment all 'CERTMANAGER' / 'METRICS-WITH-CERTS' sections to enable.
#- path: cert_metrics_manager_patch.yaml
#  target:
#    kind: Deployment

# [WEBHOOK] To enable webhook, uncomment all the sections with [WEBHOOK] prefix including the one in
# crd/kustomization.yaml
- path: manager_webhook_patch.yaml
  target:
    kind: Deployment

