# Minimal CiliumNetworkPolicy CRD stub for envtest (Q208).
#
# NOT the upstream Cilium schema — just enough structure for the test apiserver to
# accept the CiliumNetworkPolicy objects the GMC emits in CiliumFQDN mode so the
# integration suite can assert emission. spec is preserve-unknown-fields, so the GMC's
# real (un-validated here) spec round-trips. Real clusters install Cilium's own CRD.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ciliumnetworkpolicies.cilium.io
spec:
  group: cilium.io
  names:
    kind: CiliumNetworkPolicy
    listKind: CiliumNetworkPolicyList
    plural: ciliumnetworkpolicies
    singular: ciliumnetworkpolicy
    shortNames:
      - cnp
  scope: Namespaced
  versions:
    - name: v2
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
