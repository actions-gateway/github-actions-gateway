version: "2"
# Repo-root config. Each go.work module is linted from its own directory
# (see the `lint` target in the root Makefile and .github/workflows/unit-test.yml).
#
# Scope: catch regressions of the bugs and idiom violations tracked in Queue
# items 38-41. Tightenings (e.g. modernize/any, predeclared shadowing,
# errcheck on ignored returns) land alongside those items.
run:
  # Upstream v2 default is 0 (no timeout); we keep a deadline as a canary for a
  # genuinely wedged analysis. 10m (not the former 5m) tolerates a run that is
  # slow because it is contending for CPU with a concurrent build — the local
  # heavy-build lock (scripts/lib/common.sh: serialize_heavy_build) already
  # serializes sibling `make check` runs on a dev machine, but a run can still
  # queue behind one, and that wait counts against this budget. CI is
  # uncontended and never approaches it.
  timeout: 10m
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - dupl
    - errcheck
    - forbidigo
    - gosec
    - govet
    - ineffassign
    - staticcheck
    - unused
  settings:
    forbidigo:
      # Bounded-by-default HTTP clients (Q138). http.DefaultClient and the
      # http.Get/Post/... package helpers have no timeout: a slow or black-holed
      # peer wedges the calling goroutine until the multi-minute OS TCP timeout
      # (the Q108/Q134 failure class). Production code must build its client with
      # githubapp/httpx.NewClient instead. The one sanctioned exception — the
      # broker long-poll listener (broker.NewHTTPClient) — holds the connection
      # open by design and is annotated inline where it must use the default.
      #
      # noctx was evaluated for the request-without-context half of this class but
      # is too coarse to pair here: golangci-lint exposes no noctx config, so it
      # also fails net.Listen, net.DialTimeout, and os/exec.Command — all
      # legitimate and unrelated to the no-read-timeout bug (e.g. the egress
      # proxy's listeners). Production request construction already uses
      # http.NewRequestWithContext throughout, so forbidigo alone covers Q138.
      forbid:
        - pattern: ^http\.DefaultClient$
          msg: "http.DefaultClient has no timeout and wedges the caller on a slow peer (Q138); use githubapp/httpx.NewClient(). Long-poll is the documented exception: broker.NewHTTPClient."
        - pattern: ^http\.(Get|Post|PostForm|Head)$
          msg: "the http.Get/Post/PostForm/Head helpers use http.DefaultClient (no timeout, no context) (Q138); build a request and call (*http.Client).Do on a githubapp/httpx.NewClient()."
      # Comments are not forbidden — only real expressions.
      exclude-godoc-examples: true
      analyze-types: true
    dupl:
      # Token threshold for a clone to be reported. golangci-lint's default is
      # 150; we keep it. Lower values (the dupl binary's own default is 50) drown
      # the signal in trivial struct-literal and table-test boilerplate; 150
      # catches the multi-statement copy-paste we care about (e.g. a duplicated
      # SecurityContext builder block) without flagging short, idiomatic repeats.
      threshold: 150
    gosec:
      # Whole-rule exclusions, each justified. These are either redundant with
      # a linter we already run, or fire pervasively as false positives on this
      # codebase's design. Everything NOT listed here stays enabled and is
      # triaged per-occurrence with a targeted `//nolint:gosec // Gxxx: reason`.
      # This mirrors the staticcheck `checks` list below — disable the noisy
      # rule families wholesale, justify the specific accepts inline.
      excludes:
        # G104: unhandled errors. Redundant — the `errcheck` linter (enabled
        # above) already covers this and reports it with better call-site context.
        - G104
        # G109/G115: integer overflow on type conversions. Every conversion the
        # rule flags here is on a bounded slice length or small index (frame
        # headers, agent indices, listener counts), never an attacker-influenced
        # 64-bit value. The rule has a very high false-positive rate and no way
        # to express "this value is bounded" short of an annotation per site.
        - G109
        - G115
        # G304: file inclusion via variable. Every flagged read takes an
        # operator-configured, trusted path (CA bundles, the credentials dir,
        # the worker's JIT/payload files) — never an attacker-controlled one.
        - G304
        # G703/G704/G706: experimental taint-analysis rules (path traversal,
        # SSRF, log injection). The egress proxy and listener dial caller- and
        # GitHub-specified hosts and log operator-supplied addresses *by design*
        # — that is the product. These are false positives for a forward proxy.
        - G703
        - G704
        - G706
    staticcheck:
      # Disabled checks:
      # - QFxxxx: refactor "quick fix" suggestions (style, not bugs).
      # - ST1000: requires a package comment on every package. Noise on
      #   internal packages whose API surface is documented at type/func
      #   level. CLAUDE.md's "godoc comments" rule covers public packages
      #   (api/, broker/) where package comments already exist.
      checks: ["all", "-QF1001", "-QF1003", "-QF1008", "-QF1012", "-ST1000"]
  exclusions:
    generated: lax
    rules:
      # dupl: exclude test files. Table-style tests intentionally repeat the
      # setup/reconcile/assert scaffolding per case (e.g. the ScaleUp/ScaleDown
      # and VersionTooOld/RateLimited condition tests in cmd/agc), which reads
      # more clearly kept separate than merged behind a helper. Scoping the
      # exclusion to _test.go — rather than all of internal/* as
      # cmd/gmc/.golangci.yml does — keeps dupl active on production code,
      # including the builder.go SecurityContext copy-paste this linter is here
      # to catch.
      - path: _test\.go
        linters:
          - dupl
      # forbidigo targets production HTTP clients (Q138). Tests legitimately use
      # http.DefaultClient and http.Get against local httptest servers, which are
      # bounded by the test itself.
      - path: _test\.go
        linters:
          - forbidigo
      # Kubebuilder-generated GroupVersion scaffolding still uses
      # scheme.Builder; not under our control until kubebuilder updates. Matches
      # every API version dir (v1alpha1, v2alpha1, …).
      - path: api/v[0-9a-z]+/groupversion_info\.go
        linters:
          - staticcheck
        text: "SA1019.*scheme\\.Builder"
      # System cert pool test deliberately uses x509.CertPool.Subjects to
      # assert superset behavior; rewrite is tracked separately.
      - path: cmd/agc/internal/transport/proxytrust_test\.go
        linters:
          - staticcheck
        text: "SA1019.*Subjects"
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
  settings:
    gofmt:
      simplify: true
  exclusions:
    generated: lax
    paths:
      - vendor
      - third_party$
      - builtin$
      - examples$
